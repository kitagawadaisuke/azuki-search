<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ff8a3d">
<meta name="description" content="NHK Eテレ「おかあさんといっしょ」「いないいないばぁ」の録画から「あの曲どこ？」を最速検索する索引アプリ">
<title>あずきサーチ</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="あずき">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<style>
  :root {
    /* 温かくて明るい、Eテレカラフル感 */
    --bg: #fff7e8;
    --surface: #ffffff;
    --surface-2: #fff0d6;
    --text: #3d2817;
    --text-dim: #8f7357;
    --accent: #ff8a3d;         /* あたたかオレンジ */
    --accent-2: #ff5f9c;        /* いちごピンク */
    --okaasan: #ffa94d;         /* おかあさんといっしょ：たまご黄色 */
    --inai: #ff6bb0;            /* いないいないばあ：ピンク */
    --mint: #4fd6a0;            /* アクセント：ミント */
    --sky: #6ac6e8;             /* アクセント：空色 */
    --shadow-soft: 0 2px 8px rgba(255, 138, 61, 0.12);
    --shadow-card: 0 3px 16px rgba(61, 40, 23, 0.08);
    --safe-bottom: env(safe-area-inset-bottom);
    --safe-top: env(safe-area-inset-top);

    /* === Typography scale === */
    --fs-xs: 11px;       /* メタ・補足・件数バッジ */
    --fs-sm: 12.5px;     /* セカンダリ情報・ジャンルchip・タグ */
    --fs-md: 14px;       /* 本文サイズ */
    --fs-lg: 15.5px;     /* カードタイトル */
    --fs-xl: 19px;       /* セクション見出し */
    --fs-2xl: 24px;      /* H1 */
    --fw-normal: 500;
    --fw-bold: 700;
    --fw-heavy: 800;

    /* レイアウト用 spacing */
    --gap-xs: 4px;
    --gap-sm: 8px;
    --gap-md: 12px;
    --gap-lg: 18px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }

  body {
    background:
      radial-gradient(ellipse at top left, rgba(255, 170, 80, 0.15), transparent 50%),
      radial-gradient(ellipse at top right, rgba(255, 107, 176, 0.12), transparent 50%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Maru Gothic ProN", "Hiragino Sans", "Yu Gothic UI", sans-serif;
    min-height: 100vh;
    padding-top: var(--safe-top);
    /* bottom nav分の余白(72px) + safe area */
    padding-bottom: calc(76px + var(--safe-bottom));
    line-height: 1.5;
  }

  /* デスクトップ/タブレットでのモバイル幅レイアウトcap */
  header, main, .bottom-nav {
    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
  }
  main { padding: 0 16px; }
  .bottom-nav { left: 0; right: 0; }
  @media (min-width: 540px) {
    .bottom-nav {
      left: 50%;
      right: auto;
      transform: translateX(-50%);
    }
  }

  header {
    padding: 14px 16px 10px;
    position: sticky;
    top: 0;
    background: linear-gradient(180deg, var(--bg) 0%, rgba(255, 247, 232, 0.92) 100%);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    z-index: 10;
    border-bottom: 1px solid rgba(255, 138, 61, 0.08);
  }

  h1 {
    font-size: var(--fs-2xl);
    margin: 0;
    font-weight: 900;
    letter-spacing: 0.01em;
    color: var(--text);
    line-height: 1.1;
  }

  /* ===== ブランド帯 (TVマスコット + サブタイトル) ===== */
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0 0 12px;
  }
  .brand-mascot {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, #6ac6e8 0%, #4fd6a0 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    box-shadow: var(--shadow-soft);
    line-height: 1;
  }
  .brand-text {
    flex: 1;
    min-width: 0;
  }
  .brand-sub {
    font-size: var(--fs-xs);
    color: var(--text-dim);
    font-weight: 600;
    margin-top: 2px;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .search-wrap {
    position: relative;
  }
  .search-box {
    width: 100%;
    background: var(--surface);
    border: 2px solid transparent;
    border-radius: 18px;
    padding: 14px 50px 14px 20px;
    color: var(--text);
    font-size: 17px;
    outline: none;
    box-shadow: var(--shadow-soft);
    text-align: center;
    transition: all 0.15s;
  }
  .voice-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    border: none;
    cursor: pointer;
    font-size: 18px;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(255, 95, 156, 0.35);
    transition: transform 0.1s;
  }
  .voice-btn:active { transform: translateY(-50%) scale(0.92); }

  /* 検索候補サジェスト */
  .suggest-pop {
    position: absolute;
    left: 0;
    right: 0;
    top: calc(100% + 6px);
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 8px 28px rgba(61,40,23,0.18);
    z-index: 20;
    overflow: hidden;
    max-height: 280px;
    overflow-y: auto;
  }
  .suggest-item {
    padding: 11px 18px;
    cursor: pointer;
    border-bottom: 1px solid rgba(143,115,87,0.06);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    transition: background 0.1s;
  }
  .suggest-item:last-child { border-bottom: none; }
  .suggest-item:hover, .suggest-item:active { background: var(--surface-2); }
  .suggest-item .s-icon { font-size: 14px; opacity: 0.6; }
  .suggest-item .s-title { font-weight: 700; flex: 1; }
  .suggest-item .s-meta { font-size: 11px; color: var(--text-dim); }
  .suggest-item mark {
    background: rgba(255,138,61,0.25);
    color: var(--text);
    padding: 0 2px;
    border-radius: 3px;
  }
  .voice-btn.listening {
    background: linear-gradient(135deg, #ff4444 0%, #ff6b9d 100%);
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 2px 6px rgba(255, 68, 68, 0.5); }
    50% { box-shadow: 0 2px 6px rgba(255, 68, 68, 0.5), 0 0 0 12px rgba(255, 68, 68, 0); }
  }
  .search-box:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(255, 138, 61, 0.15);
  }
  .search-box::placeholder { color: var(--text-dim); }

  .filter-pills {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
    justify-content: center;
  }
  .filter-pills::-webkit-scrollbar { display: none; }
  .pill {
    flex: 0 0 auto;
    padding: 9px 16px;
    border-radius: 999px;
    background: var(--surface);
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 700;
    border: 1.5px solid rgba(143, 115, 87, 0.15);
    cursor: pointer;
    box-shadow: var(--shadow-soft);
    transition: all 0.15s;
  }
  .pill.active {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 4px 10px rgba(255, 95, 156, 0.3);
  }

  main {
    padding: 12px 16px;
  }

  .section-title {
    font-size: 13px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 20px 4px 10px;
    font-weight: 700;
  }

  .card {
    background: var(--surface);
    border-radius: 18px;
    padding: 16px 18px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    box-shadow: var(--shadow-card);
    transition: transform 0.1s, background 0.15s;
    min-height: 72px;
  }
  .card:active { transform: scale(0.98); background: var(--surface-2); }

  .show-badge {
    flex: 0 0 4px;
    height: 48px;
    border-radius: 4px;
    background: var(--okaasan);
  }
  .card[data-show="inai"] .show-badge { background: var(--inai); }

  .card-main {
    flex: 1;
    min-width: 0;
  }
  .song-title {
    font-size: 18px;
    font-weight: 700;
    margin: 0 0 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .song-meta {
    font-size: 13px;
    color: var(--text-dim);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .show-name { color: var(--okaasan); font-weight: 600; }
  .card[data-show="inai"] .show-name { color: var(--inai); }

  .star {
    flex: 0 0 auto;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--surface-2);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 22px;
    color: var(--text-dim);
    transition: all 0.15s;
  }
  .star:active { transform: scale(0.9); }
  .star.fav { color: var(--accent); background: rgba(255,184,77,0.15); }

  /* Detail modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    width: 100%;
    border-radius: 24px 24px 0 0;
    padding: 28px 24px calc(32px + var(--safe-bottom));
    animation: slideUp 0.25s ease;
    max-height: 85vh;
    overflow-y: auto;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--surface-2);
    border-radius: 2px;
    margin: -12px auto 20px;
  }

  .modal h2 {
    font-size: 26px;
    margin: 0 0 4px;
    font-weight: 700;
  }
  .modal-show {
    font-size: 14px;
    margin-bottom: 24px;
    color: var(--okaasan);
    font-weight: 600;
  }
  .modal[data-show="inai"] .modal-show { color: var(--inai); }

  .time-block {
    background: linear-gradient(135deg, rgba(255, 138, 61, 0.08) 0%, rgba(255, 107, 176, 0.06) 100%);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
    border: 1.5px solid rgba(255, 138, 61, 0.15);
  }
  .time-date {
    font-size: 18px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .time-jump {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .time-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  .action-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .action-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    background: var(--surface-2);
    border: none;
    border-radius: 14px;
    color: var(--text);
    font-size: 16px;
    font-weight: 600;
    text-align: left;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
  }
  .action-btn:active { background: var(--surface-2); }

  .meta-block {
    background: rgba(255, 138, 61, 0.05);
    border: 1px solid rgba(255, 138, 61, 0.15);
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 14px;
  }
  .meta-line {
    display: flex;
    gap: 10px;
    padding: 5px 0;
    font-size: 13px;
    border-bottom: 1px dashed rgba(143, 115, 87, 0.12);
    align-items: baseline;
  }
  .meta-line:last-child { border-bottom: none; }
  .meta-label {
    flex: 0 0 76px;
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .meta-line span:last-child { flex: 1; color: var(--text); }
  .meta-line.other-dates {
    display: block;
  }
  .meta-line.other-dates .meta-label {
    flex: unset;
    display: block;
    margin-bottom: 6px;
  }
  .other-date-list {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .other-date-chip {
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 999px;
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid rgba(255, 138, 61, 0.2);
    cursor: pointer;
    font-weight: 600;
  }
  .other-date-chip:active { background: var(--accent); color: #fff; }
  .action-icon {
    flex: 0 0 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .icon-tv { background: rgba(255,184,77,0.2); color: var(--accent); }
  .icon-yt { background: rgba(255,68,68,0.2); color: #ff5555; }
  .icon-spo { background: rgba(30,215,96,0.2); color: #1ed760; }
  .icon-lyrics { background: rgba(139,92,246,0.18); color: #7c4dff; }

  .lyric-hero {
    background: linear-gradient(135deg, rgba(255,138,61,0.1) 0%, rgba(255,95,156,0.08) 100%);
    border: 1.5px solid rgba(255,138,61,0.2);
    border-radius: 18px;
    padding: 18px 20px;
    margin-bottom: 14px;
    text-align: center;
  }
  .lyric-hero .lyric-label {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .lyric-hero .lyric-text {
    font-size: 19px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.5;
    letter-spacing: 0.02em;
    margin: 4px 0;
  }
  .lyric-hero .lyric-text::before { content: "♪ "; color: var(--accent); }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-emoji { font-size: 48px; margin-bottom: 12px; }

  /* Bottom nav */
  nav.bottom {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid rgba(143, 115, 87, 0.1);
    padding: 8px 0 calc(8px + var(--safe-bottom));
    display: flex;
    z-index: 50;
    box-shadow: 0 -4px 20px rgba(61, 40, 23, 0.06);
  }
  .nav-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-dim);
    padding: 8px 4px;
    font-size: 11px;
    font-weight: 600;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 22px; }

  /* Quick stats */
  .repeat-hint {
    font-size: 12px;
    color: var(--accent);
    background: rgba(255,184,77,0.1);
    padding: 4px 10px;
    border-radius: 999px;
    display: inline-block;
    margin-top: 4px;
  }

  .recent-searches {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .recent-tag {
    font-size: 13px;
    padding: 6px 12px;
    background: var(--surface-2);
    border-radius: 999px;
    color: var(--text);
    border: none;
    cursor: pointer;
  }
  .recent-tag::before { content: "🕐 "; opacity: 0.6; }

  .group-header {
    font-size: 16px;
    font-weight: 700;
    margin: 16px 4px 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .group-count {
    font-size: 12px;
    background: var(--accent);
    color: #1a1a2e;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 700;
  }
  .group-card {
    background: var(--surface);
    border-radius: 16px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .group-row {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: background 0.15s;
  }
  .group-row:last-child { border-bottom: none; }
  .group-row:active { background: var(--surface-2); }
  .group-row .when {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
  }
  .group-row .when small {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 400;
    margin-top: 2px;
  }
  .group-row .at {
    font-family: -apple-system, sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }

  /* 日別タイムライン表示 */
  .day-block {
    margin-bottom: 18px;
  }
  .show-divider {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 4px 4px 8px;
    font-size: var(--fs-sm);
    font-weight: 800;
  }
  .show-divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: rgba(143,115,87,0.14);
  }
  .show-divider-okaasan .show-divider-name { color: var(--accent); }
  .show-divider-inai .show-divider-name { color: var(--inai); }
  .show-divider-count {
    font-size: var(--fs-xs);
    font-weight: 700;
    color: var(--text-dim);
    background: var(--surface);
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid rgba(143,115,87,0.12);
  }
  .day-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin: 8px 4px 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--surface-2);
  }
  .day-label {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .day-label.today { color: var(--accent); }
  .day-sub {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 600;
  }
  .day-show-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(255,184,77,0.15);
    color: var(--accent);
    margin-left: auto;
    font-weight: 600;
  }

  .timeline {
    background: var(--surface);
    border-radius: 20px;
    padding: 6px 0;
    overflow: hidden;
    box-shadow: var(--shadow-card);
  }
  .timeline-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    cursor: pointer;
    transition: background 0.12s;
    border-bottom: 1px solid rgba(143, 115, 87, 0.08);
  }
  .timeline-row:last-child { border-bottom: none; }
  .timeline-row:active { background: var(--surface-2); }

  .seq {
    flex: 0 0 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--surface-2);
    color: var(--accent);
    font-size: 14px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    font-variant-numeric: tabular-nums;
    border: 2px solid rgba(255, 138, 61, 0.2);
  }
  .timeline-row.is-fav .seq {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    color: #fff;
    border-color: transparent;
  }
  .timeline-row.is-nested {
    padding-left: 36px;
    background: rgba(255,255,255,0.015);
  }
  .timeline-row.is-nested .seq {
    background: transparent;
    border: 1px dashed var(--text-dim);
    color: var(--accent);
  }
  .row-main {
    flex: 1;
    min-width: 0;
  }
  .row-title {
    font-size: 16px;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .row-tag {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .row-snippet {
    font-size: 12px;
    color: var(--accent);
    margin-top: 4px;
    font-weight: 600;
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .predicted-badge {
    display: inline-block;
    font-size: 9px;
    padding: 1px 6px;
    background: rgba(106,198,232,0.18);
    color: #3a9dc8;
    border-radius: 999px;
    margin-left: 4px;
    vertical-align: middle;
    font-weight: 700;
  }
  .corner-uta { color: #e67a2e; font-weight: 700; }
  .corner-ningyo { color: #d94e8d; font-weight: 700; }
  .corner-anime { color: #3a9dc8; font-weight: 700; }
  .corner-taiso { color: #2eb580; font-weight: 700; }
  .corner-corner { color: #8a5cd8; font-weight: 700; }

  .row-fav {
    flex: 0 0 36px;
    height: 36px;
    border-radius: 50%;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
  }
  .row-fav.fav { color: var(--accent); }

  /* 日付タブ（横スクロール） */
  .day-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 6px 0 14px;
    scrollbar-width: none;
    -ms-overflow-style: none;
    scroll-snap-type: x mandatory;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex: 0 0 auto;
    min-width: 62px;
    padding: 10px 12px;
    border-radius: 16px;
    background: var(--surface);
    color: var(--text-dim);
    border: 2px solid rgba(143, 115, 87, 0.1);
    font-weight: 700;
    text-align: center;
    line-height: 1.2;
    cursor: pointer;
    scroll-snap-align: start;
    box-shadow: var(--shadow-soft);
    transition: all 0.15s;
  }
  .day-tab .dt-wd {
    font-size: var(--fs-xs);
    opacity: 0.7;
    display: block;
  }
  .day-tab .dt-d {
    font-size: var(--fs-xl);
    font-weight: 900;
    font-variant-numeric: tabular-nums;
  }
  .day-tab .dt-sub {
    font-size: var(--fs-xs);
    opacity: 0.7;
    margin-top: 2px;
    display: block;
    font-weight: 600;
  }
  .day-tab.active {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    color: #fff;
    border-color: transparent;
    transform: scale(1.05);
    box-shadow: 0 4px 14px rgba(255, 95, 156, 0.32);
  }
  .day-tab.active .dt-wd,
  .day-tab.active .dt-sub { opacity: 0.95; }
  .day-tab.today::before {
    content: "●";
    color: var(--mint);
    font-size: 9px;
    display: block;
    line-height: 1;
    margin-bottom: 2px;
  }
  .day-tab.active.today::before { color: #fff; }

  /* タブ下のコンテンツヘッダ */
  .selected-day-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 8px 4px 4px;
    margin-bottom: 4px;
  }
  .selected-day-header .big {
    font-size: 20px;
    font-weight: 800;
  }
  .selected-day-header .sub {
    font-size: 12px;
    color: var(--text-dim);
  }

  /* 検索でヒット強調 */
  .row-tag .mood-chip {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    background: rgba(255,184,77,0.15);
    color: var(--accent);
    border-radius: 999px;
    margin-left: 4px;
  }

  /* ===== 今日のピックアップ（NHK公式あらすじ） ===== */
  .pickup {
    background: linear-gradient(135deg, #fffaef 0%, #ffeed1 100%);
    border-radius: 22px;
    padding: 14px 16px 16px;
    margin: 6px 4px 18px;
    border: 1.5px solid rgba(255, 184, 77, 0.32);
    box-shadow: var(--shadow-card);
    position: relative;
    overflow: hidden;
  }
  .pickup::before {
    content: "✨";
    position: absolute;
    top: -10px;
    right: -10px;
    font-size: 60px;
    opacity: 0.12;
    pointer-events: none;
  }
  .pickup-label {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: var(--fs-xs);
    font-weight: 800;
    color: var(--accent);
    background: #fff;
    padding: 3px 10px;
    border-radius: 999px;
    margin-bottom: 8px;
    box-shadow: var(--shadow-soft);
    letter-spacing: 0.04em;
  }
  .pickup-label.label-inai {
    color: var(--inai);
  }
  .pickup-title {
    font-size: var(--fs-md);
    font-weight: 800;
    margin-bottom: 6px;
    color: var(--text);
  }
  .pickup-desc {
    font-size: var(--fs-sm);
    line-height: 1.65;
    color: var(--text);
    opacity: 0.82;
    word-break: break-word;
  }

  /* ===== カード型アイテム (mockup準拠) ===== */
  .item-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--surface);
    border-radius: 16px;
    margin: 0 0 8px;
    box-shadow: 0 1px 4px rgba(61, 40, 23, 0.06);
    cursor: pointer;
    position: relative;
    border: 1.5px solid transparent;
    transition: transform 0.12s, box-shadow 0.12s, border-color 0.12s;
  }
  .item-card:active {
    transform: scale(0.985);
  }
  .item-card:hover {
    box-shadow: 0 3px 12px rgba(61, 40, 23, 0.08);
  }
  .item-card.is-fav {
    border-color: rgba(255, 138, 61, 0.28);
    background: linear-gradient(180deg, #fff 0%, #fffaf2 100%);
  }
  .item-card.is-nested {
    margin-left: 28px;
    background: rgba(255, 247, 232, 0.55);
    box-shadow: none;
    border: 1px dashed rgba(143, 115, 87, 0.2);
  }

  /* 左: 番号バッジ + 時刻 */
  .card-num {
    flex: 0 0 38px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .card-num-circle {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--sky);
    color: #fff;
    font-size: var(--fs-md);
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }
  .card-num-time {
    font-size: var(--fs-xs);
    font-weight: 700;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }

  /* ジャンル絵文字square */
  .card-icon {
    flex: 0 0 42px;
    height: 42px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    line-height: 1;
  }
  .card-icon.thumb-uta { background: linear-gradient(135deg, #fff5d6 0%, #ffe19a 100%); }
  .card-icon.thumb-ningyo { background: linear-gradient(135deg, #ffe2ec 0%, #ffbcd2 100%); }
  .card-icon.thumb-anime { background: linear-gradient(135deg, #e0f2fa 0%, #aaddef 100%); }
  .card-icon.thumb-taiso { background: linear-gradient(135deg, #def6e4 0%, #aae3c0 100%); }
  .card-icon.thumb-corner { background: linear-gradient(135deg, #ede2f7 0%, #ccb7e9 100%); }

  /* タイトルprefix (うた/コーナー/etc.) */
  .card-title-prefix {
    color: var(--text-dim);
    font-weight: 700;
    margin-right: 2px;
    font-size: var(--fs-sm);
  }

  .card-body {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-right: 32px; /* fav button space */
  }
  .card-title {
    font-size: var(--fs-md);
    font-weight: 700;
    line-height: 1.35;
    margin-bottom: 4px;
    word-break: break-word;
    color: var(--text);
  }
  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
    font-size: var(--fs-xs);
  }
  .card-genre {
    font-weight: 700;
    font-size: var(--fs-xs);
    padding: 2px 8px;
    border-radius: 999px;
    letter-spacing: 0;
  }
  .card-genre.g-uta { background: rgba(230, 122, 46, 0.13); color: #c66220; }
  .card-genre.g-ningyo { background: rgba(217, 78, 141, 0.14); color: #b73e75; }
  .card-genre.g-anime { background: rgba(58, 157, 200, 0.14); color: #2a83ad; }
  .card-genre.g-taiso { background: rgba(46, 181, 128, 0.13); color: #1e9268; }
  .card-genre.g-corner { background: rgba(138, 92, 216, 0.14); color: #6f47b3; }
  .card-parent {
    font-size: var(--fs-xs);
    color: var(--text-dim);
    font-weight: 600;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 6px;
  }
  .card-tag {
    font-size: var(--fs-xs);
    padding: 2px 8px;
    background: #f4eef8;
    color: var(--text-dim);
    border-radius: 999px;
    font-weight: 600;
    line-height: 1.4;
  }
  /* mockupではタグ最初の1個=ジャンル名(色付き)、残りは普通 */
  .card-tag-genre {
    background: #fff3d6;
    color: #c66220;
  }

  .card-snippet {
    font-size: var(--fs-sm);
    color: var(--accent);
    margin-top: 6px;
    font-weight: 600;
    line-height: 1.35;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-snippet::before {
    content: "♪ ";
    margin-right: 1px;
  }

  .card-fav {
    position: absolute;
    top: 50%;
    right: 8px;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: transparent;
    border: none;
    color: rgba(143, 115, 87, 0.4);
    font-size: 18px;
    cursor: pointer;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    padding: 0;
    transition: color 0.12s, transform 0.12s;
  }
  .card-fav:hover {
    background: rgba(255, 138, 61, 0.08);
  }
  .card-fav:active {
    transform: translateY(-50%) scale(0.85);
  }
  .card-fav.fav { color: var(--accent); }

  .card-source-badge {
    display: inline-block;
    background: rgba(106, 198, 232, 0.18);
    color: #3a9dc8;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 6px;
    font-weight: 800;
    letter-spacing: 0.05em;
    line-height: 1.4;
  }
  .card-source-badge.src-nhk {
    background: rgba(255, 95, 156, 0.14);
    color: var(--accent-2);
  }
  .search-more {
    font-size: var(--fs-xs);
    color: var(--text-dim);
    padding: 2px 18px 8px;
    margin: -8px 4px 8px;
    line-height: 1.4;
  }

  /* ===== 日付見出し ===== */
  .date-heading {
    font-size: var(--fs-lg);
    font-weight: 800;
    color: var(--text);
    margin: 14px 4px 12px;
    line-height: 1.3;
    letter-spacing: 0.01em;
  }
  .date-heading-empty {
    color: var(--text-dim);
    font-weight: 700;
    font-size: var(--fs-md);
  }

  /* ===== 番組ラベル(同日に複数番組ある時の小区切り) ===== */
  .show-label {
    font-size: var(--fs-sm);
    font-weight: 800;
    margin: 14px 4px 8px;
    color: var(--accent);
    display: inline-block;
    padding: 2px 12px;
    background: rgba(255, 184, 77, 0.15);
    border-radius: 999px;
  }
  .show-label-inai {
    color: var(--inai);
    background: rgba(255, 107, 176, 0.15);
  }

  /* ===== 免責文 ===== */
  .disclaimer {
    text-align: center;
    font-size: var(--fs-xs);
    color: var(--text-dim);
    margin: 24px 8px 8px;
    opacity: 0.7;
    font-weight: 500;
  }

  /* ===== Bottom Navigation ===== */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-top: 1px solid rgba(143, 115, 87, 0.14);
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    z-index: 100;
    padding-bottom: var(--safe-bottom);
  }
  .bn-tab {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 8px 4px 10px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    transition: color 0.12s, background 0.12s;
    font-family: inherit;
  }
  .bn-tab:active {
    background: rgba(255, 184, 77, 0.1);
  }
  .bn-icon {
    font-size: 22px;
    line-height: 1;
  }
  .bn-label {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .bn-tab.is-active {
    color: var(--accent-2);
  }
  .bn-tab.is-active .bn-icon {
    transform: scale(1.05);
  }

  /* ===== 月カレンダーウィジェット ===== */
  .calendar {
    background: var(--surface);
    border-radius: 18px;
    padding: 12px 14px 10px;
    margin: 4px 0 14px;
    box-shadow: var(--shadow-card);
    border: 1px solid rgba(143, 115, 87, 0.06);
  }
  .cal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }
  .cal-month {
    font-size: var(--fs-md);
    font-weight: 800;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .cal-nav {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--surface-2);
    border: none;
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: background 0.12s;
  }
  .cal-nav:hover { background: rgba(255, 184, 77, 0.25); }
  .cal-nav:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    font-size: var(--fs-xs);
    font-weight: 700;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 4px;
  }
  .cal-weekdays .sat { color: var(--sky); }
  .cal-weekdays .sun { color: var(--accent-2); }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .cal-day {
    width: 100%;
    height: 44px;
    max-width: 44px;
    margin: 0 auto;
    background: transparent;
    border: 2px solid transparent;
    border-radius: 50%;
    color: var(--text);
    font-size: var(--fs-sm);
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    position: relative;
    transition: background 0.12s, border-color 0.12s;
    padding: 0;
    font-variant-numeric: tabular-nums;
  }
  .cal-day:hover:not(:disabled):not(.cal-empty) {
    background: var(--surface-2);
  }
  .cal-day.cal-empty {
    visibility: hidden;
    cursor: default;
  }
  .cal-day.cal-no-data {
    color: rgba(143, 115, 87, 0.4);
    cursor: default;
    pointer-events: none;
  }
  .cal-day.cal-sat:not(.cal-no-data):not(.cal-active) { color: var(--sky); }
  .cal-day.cal-sun:not(.cal-no-data):not(.cal-active) { color: var(--accent-2); }
  .cal-day.cal-active {
    background: rgba(106, 198, 232, 0.12);
    color: var(--sky);
    border-color: var(--sky);
    font-weight: 800;
    box-shadow: 0 2px 6px rgba(106, 198, 232, 0.25);
  }
  .cal-day.cal-today:not(.cal-active) {
    border-color: rgba(79, 214, 160, 0.6);
  }
  .cal-day.cal-today:not(.cal-active)::after {
    content: "";
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    background: var(--mint);
    border-radius: 50%;
  }
  .cal-day.cal-has-data:not(.cal-active)::before {
    content: "";
    position: absolute;
    top: 3px;
    right: 3px;
    width: 5px;
    height: 5px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0.55;
  }

  /* ===== ジャンル横スクロールバー ===== */
  .genre-bar {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 4px 0 8px;
    scrollbar-width: none;
    -ms-overflow-style: none;
    -webkit-overflow-scrolling: touch;
  }
  .genre-bar::-webkit-scrollbar { display: none; }
  .genre-chip {
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    background: var(--surface);
    color: var(--text);
    border: 1.5px solid rgba(143, 115, 87, 0.14);
    border-radius: 999px;
    font-size: var(--fs-sm);
    font-weight: 700;
    cursor: pointer;
    transition: all 0.12s;
    line-height: 1;
  }
  .genre-chip:hover { background: var(--surface-2); }
  .genre-chip.is-empty {
    opacity: 0.45;
  }
  .genre-chip.is-on {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 2px 8px rgba(255, 95, 156, 0.25);
  }
  .genre-chip-count {
    font-size: var(--fs-xs);
    background: rgba(0,0,0,0.05);
    color: var(--text-dim);
    padding: 1px 6px;
    border-radius: 8px;
    font-weight: 800;
    line-height: 1.4;
  }
  .genre-chip.is-on .genre-chip-count {
    background: rgba(255,255,255,0.28);
    color: #fff;
  }
  .genre-chip.is-reset {
    color: var(--accent);
    border-color: rgba(255, 138, 61, 0.3);
    background: rgba(255, 240, 214, 0.6);
  }

  /* ===== 絞り込みパネル(旧) ===== */
  .filter-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 10px 14px;
    background: var(--surface);
    border: 1.5px solid rgba(143, 115, 87, 0.12);
    border-radius: 14px;
    color: var(--text);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: var(--shadow-soft);
    margin: 4px 0 8px;
    transition: background 0.12s, border-color 0.12s;
  }
  .filter-toggle:hover { background: var(--surface-2); }
  .filter-toggle.is-open {
    background: linear-gradient(135deg, #fff7e8 0%, #ffe19a 100%);
    border-color: rgba(255, 138, 61, 0.3);
  }
  .filter-toggle-icon { font-size: 14px; }
  .filter-toggle-summary {
    flex: 1;
    text-align: left;
    color: var(--text-dim);
    font-weight: 600;
    font-size: 12px;
  }
  .filter-toggle.is-active .filter-toggle-summary {
    color: var(--accent);
  }
  .filter-toggle-arrow {
    font-size: 10px;
    color: var(--text-dim);
    transition: transform 0.2s;
  }
  .filter-toggle.is-open .filter-toggle-arrow {
    transform: rotate(180deg);
  }

  .filter-panel {
    background: var(--surface);
    border-radius: 16px;
    padding: 14px 14px 12px;
    margin: 0 0 12px;
    box-shadow: var(--shadow-card);
    border: 1px solid rgba(143, 115, 87, 0.08);
    animation: filter-slide 0.18s ease-out;
  }
  @keyframes filter-slide {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .filter-section + .filter-section {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed rgba(143, 115, 87, 0.16);
  }
  .filter-section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .filter-section-title {
    font-size: 12px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: 0.04em;
  }
  .filter-reset {
    background: none;
    border: none;
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    padding: 2px 4px;
  }
  .filter-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .filter-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 6px 12px;
    background: var(--surface-2);
    color: var(--text-dim);
    border: 1.5px solid transparent;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.12s;
  }
  .filter-chip:hover {
    background: rgba(255, 184, 77, 0.18);
  }
  .filter-chip.is-on {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    color: #fff;
    border-color: transparent;

// =================== Search Helpers ===================
// ひらがな↔カタカナ正規化（「ぱぴぷぺぽ」「パピプペポ」両対応）
function normalize(s) {
  return s.toLowerCase()
    .replace(/[\u30a1-\u30f6]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60)) // カナ→ひら
    .replace(/[ー－〜！？\s・]/g, ""); // 記号・空白除去
}

// 子供番組でよく使われる漢字↔ひらがな対応辞書（検索ゆらぎ対応）
// 「太鼓」「たいこ」「タイコ」どれでもヒットする
const KANJI_KANA_MAP = {
  "太鼓":"たいこ","大":"おおき","小":"ちい","歌":"うた","虹":"にじ","花":"はな",
  "海":"うみ","山":"やま","川":"かわ","空":"そら","星":"ほし","月":"つき",
  "太陽":"たいよう","雨":"あめ","雪":"ゆき","風":"かぜ","犬":"いぬ","猫":"ねこ",
  "鳥":"とり","魚":"さかな","虫":"むし","木":"き","葉":"はっぱ",
  "赤":"あか","青":"あお","黄色":"きいろ","緑":"みどり","黒":"くろ","白":"しろ",
  "電車":"でんしゃ","車":"くるま","音":"おと","光":"ひかり","時":"とき",
  "手":"て","足":"あし","目":"め","口":"くち","耳":"みみ","顔":"かお",
  "朝":"あさ","夜":"よる","昼":"ひる","今":"いま","体操":"たいそう",
  "肉":"にく","魚":"さかな","野菜":"やさい","果物":"くだもの","料理":"りょうり",
  "友達":"ともだち","家族":"かぞく","母":"かあさん","父":"とうさん",
  "歩":"あるく","走":"はしる","踊":"おどる","歌":"うた","笑":"わら",
  "蛙":"かえる","兎":"うさぎ","熊":"くま","象":"ぞう","亀":"かめ",
  "船":"ふね","飛行機":"ひこうき","バス":"ばす","電車":"でんしゃ"
};

function expandQuery(q) {
  if (!q) return [q];
  const variants = new Set([q]);
  for (const [k, v] of Object.entries(KANJI_KANA_MAP)) {
    if (q.includes(k)) variants.add(q.split(k).join(v));
    if (q.includes(v)) variants.add(q.split(v).join(k));
  }
  return [...variants].map(normalize);
}

// 検索履歴（localStorage）
function getRecent() {
  try { return JSON.parse(localStorage.getItem("recent") || "[]"); }
  catch { return []; }
}
function pushRecent(q) {
  if (!q.trim()) return;
  const r = getRecent().filter(x => x !== q);
  r.unshift(q);
  localStorage.setItem("recent", JSON.stringify(r.slice(0, 5)));
}

// =================== State ===================
const state = {
  filter: "all",
  query: "",
  selectedDate: null,  // タブで選択中の日付
  selectedChar: null,  // フィルタ対象キャラ
  favs: new Set(data.filter(d => d.fav).map(d => d.id)),
  // 絞り込みパネル
  filterOpen: false,
  genres: new Set(),       // multi-select: "うた","人形劇","アニメ","体操","コーナー"
  dateRange: "all",         // "all"|"week"|"2w"|"month"
  // カレンダー表示中の年月 (null時はselectedDateから推定)
  calYear: null,
  calMonth: null,
  // bottom nav の現在view: "home"|"date"|"keyword"|"fav"
  view: "home",
};

// キャラアイコン表（characters.json から流し込み）
const CHAR_META = {};

// =================== Render ===================
const $list = document.getElementById("list");
const $search = document.getElementById("search");
const $sectionTitle = document.getElementById("section-title");

function todayDate() {
  // ブラウザのローカルタイムで「今日の0時」を返す
  const now = new Date();
  return new Date(now.getFullYear(), now.getMonth(), now.getDate());
}

function fmtDate(iso) {
  const d = new Date(iso);
  const today = todayDate();
  const diff = Math.floor((today - d) / (1000 * 60 * 60 * 24));
  if (diff === 0) return "今日";
  if (diff === 1) return "きのう";
  if (diff === -1) return "あした";
  const w = ["日","月","火","水","木","金","土"][d.getDay()];
  return `${d.getMonth()+1}/${d.getDate()}(${w})`;
}

function todayStrIso() {
  const t = todayDate();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}-${String(t.getDate()).padStart(2,"0")}`;
}

// データロード時に検索用の正規化済みフィールドを事前計算する。
// これがないと毎打鍵で全アイテム×全フィールドにnormalize()がかかってFPS落ちる。
function precomputeSearchFields(items) {
  for (const d of items) {
    const snippetsAll = (d.snippets && d.snippets.length) ? d.snippets : (d.snippet ? [d.snippet] : []);
    const creditsFlat = d.credits ? Object.values(d.credits).flat() : [];
    d._haystack = [
      normalize(d.title),
      normalize(d.corner || ""),
      d.subcategory ? normalize(d.subcategory) : "",
      d.mood ? normalize(d.mood) : "",
      d.theme ? normalize(d.theme) : "",
      ...snippetsAll.map(normalize),
      ...(d.keywords || []).map(normalize),
      ...creditsFlat.map(normalize),
    ].join("|");
    d._titleN = normalize(d.title);
    d._keywordsN = (d.keywords || []).map(normalize);
    d._creditsN = creditsFlat.map(normalize);
  }
}

function searchMatches(d, q) {
  if (!q) return true;
  const variants = expandQuery(q);
  const haystack = d._haystack || "";
  for (const v of variants) {
    if (haystack.includes(v)) return true;
  }
  return false;
}

function render() {
  // bottom navのアクティブ状態同期
  document.querySelectorAll(".bn-tab").forEach(t => {
    t.classList.toggle("is-active", t.dataset.view === state.view);
  });
  // ヘッダタイトルもviewで動かす
  const titleEl = document.getElementById("header-title");
  if (titleEl) {
    titleEl.textContent = ({
      home: "今日の放送内容",
      date: "放送日から探す",
      keyword: "キーワード検索",
      fav: "お気に入り",
    })[state.view] || "あずきサーチ";
  }

  // viewによるquery/filterの上書き
  // - fav view: state.filterをfavに強制
  // - keyword view: stateそのまま (検索バー注力)
  // - home/date: 通常 (showフィルタは無し=両番組統合表示)
  const qRaw = state.query.trim();
  const q = normalize(qRaw);
  const isFavView = state.view === "fav";
  const isKeywordView = state.view === "keyword";

  let items = data.filter(d => {
    if (isFavView && !state.favs.has(d.id)) return false;
    if (state.genres.size > 0 && !state.genres.has(d.corner)) return false;
    if (!searchMatches(d, q)) return false;
    return true;
  });

  renderCalendar();

  items.sort((a, b) => b.date.localeCompare(a.date) || a.airtime.localeCompare(b.airtime));

  if (items.length === 0) {
    $list.innerHTML = `<div class="empty"><div class="empty-emoji">🔎</div>みつからなかったよ<br><small>カナ・ひらがな両方ためしてみてね</small></div>`;
    return;
  }

  const $heading = document.getElementById("date-heading");

  // 検索 view (キーワード検索 or 検索クエリあり)
  if (isKeywordView || q) {
    if ($heading) {
      $heading.textContent = q ? `「${qRaw}」の検索結果 (${items.length}件)` : "キーワードを入力してください";
      $heading.className = "date-heading" + (q ? "" : " date-heading-empty");
    }
    if (!q) {
      $list.innerHTML = `<div class="empty"><div class="empty-emoji">🔎</div>曲名・コーナー・歌い出し・出演者などで検索<br><small>カナ・ひらがな・漢字どれでもOK</small></div>`;
      return;
    }
    // タイトル+show でグループ化、最新放送回を代表表示
    const groups = {};
    items.forEach(d => {
      const k = `${d.title}|${d.show}`;
      if (!groups[k]) groups[k] = { title: d.title, show: d.show, items: [] };
      groups[k].items.push(d);
    });
    const groupList = Object.values(groups).sort((a, b) =>
      b.items[0].date.localeCompare(a.items[0].date)
    );
    $list.innerHTML = groupList.map(g => {
      const rep = g.items[0];
      const moreCount = g.items.length - 1;
      const moreLine = moreCount > 0
        ? `<div class="search-more">同じ曲: 他に ${moreCount} 回放送 (${g.items.slice(1, 4).map(x => fmtDate(x.date)).join(" / ")}${moreCount > 3 ? " ほか" : ""})</div>`
        : "";
      return renderItemCard(rep) + moreLine;
    }).join("");
    return;
  }

  // fav view: お気に入りのみ。日別/番組別グループ化はせず、最新順で並べる
  if (isFavView) {
    if ($heading) {
      $heading.textContent = `お気に入り (${items.length}件)`;
      $heading.className = "date-heading";
    }
    if (items.length === 0) {
      $list.innerHTML = `<div class="empty"><div class="empty-emoji">♡</div>お気に入りはまだ無いよ<br><small>気になる曲のハートを押して登録</small></div>`;
      return;
    }
    items.sort((a, b) => b.date.localeCompare(a.date) || (a.order||0) - (b.order||0));
    $list.innerHTML = items.map(d => renderItemCard(d)).join("");
    return;
  }

  // home / date view : 選択日の放送内容を表示
  const selected = state.selectedDate;
  // 同日同曲の重複を取り除く (週報 + NHK が両方merge失敗で残ってるケース対策)
  // (show, normalized_title) 単位で1個に絞り、orderが小さい/keywordsがある方を優先
  const sameDay = items.filter(d => d.date === selected);
  const dedupeMap = new Map();
  const normTitleForDedupe = s => (s || "").replace(/[ 　\s!！?？♪☆★・…]/g, "").toLowerCase();
  for (const it of sameDay) {
    const key = `${it.show}|${normTitleForDedupe(it.title)}`;
    const prev = dedupeMap.get(key);
    if (!prev) { dedupeMap.set(key, it); continue; }
    // 優先度: keywordsありを優先 → orderが小さい方を優先
    const prevHasKw = (prev.keywords || []).length > 0;
    const curHasKw = (it.keywords || []).length > 0;
    if (curHasKw && !prevHasKw) { dedupeMap.set(key, it); continue; }
    if (curHasKw === prevHasKw && (it.order || 999) < (prev.order || 999)) {
      dedupeMap.set(key, it);
    }
  }
  const dayItems = [...dedupeMap.values()].sort((a, b) => {
    // okaasanを先、inaiを後、その後 order
    if (a.show !== b.show) return a.show < b.show ? -1 : 1;
    return (a.order || 0) - (b.order || 0);
  });

  // 日付見出し
  if ($heading && selected) {
    const dt = new Date(selected);
    const weekday = ["日","月","火","水","木","金","土"][dt.getDay()];
    $heading.textContent = `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日(${weekday})の放送内容`;
    $heading.className = "date-heading";
  }

  if (dayItems.length === 0) {
    $list.innerHTML = `<div class="empty"><div class="empty-emoji">📅</div>この日の放送データはまだ無いよ<br><small>別の日を選んでみてね</small></div>`;
    return;
  }

  // ピックアップ枠 (broadcast_metaがあれば、各番組ごとに先頭で表示)
  const shownShows = [...new Set(dayItems.map(d => d.show))];
  const pickupHtml = shownShows.map(show => {
    const meta = (broadcastMeta[show] || {})[selected];
    if (!meta || !meta.description) return "";
    return `
      <div class="pickup">
        <span class="pickup-label ${show==='inai'?'label-inai':''}">✨ ${SHOWS[show].name} ピックアップ</span>
        <div class="pickup-title">${escapeHtml(meta.episodeName || '')}</div>
        <div class="pickup-desc">${escapeHtml(meta.description)}</div>
      </div>
    `;
  }).join("");

  // 番組ごとの軽いラベル(複数番組ある場合のみ表示)
  let html = pickupHtml;
  if (shownShows.length > 1) {
    // okaasan items → label → inai items のように差し込む
    let lastShow = null;
    dayItems.forEach(d => {
      if (d.show !== lastShow) {
        html += `<div class="show-label show-label-${d.show}">${SHOWS[d.show].name}</div>`;
        lastShow = d.show;
      }
      html += renderItemCard(d);
    });
  } else {
    html += dayItems.map(d => renderItemCard(d)).join("");
  }
  $list.innerHTML = html;
}

// 時刻推定: airtime "HH:MM" + (order-1) * ~4分
function estimateTime(airtime, order) {
  if (!airtime || !order) return "";
  const m = airtime.match(/^(\d{1,2}):(\d{2})$/);
  if (!m) return "";
  let h = +m[1], min = +m[2];
  min += (order - 1) * 4;
  h += Math.floor(min / 60);
  min = min % 60;
  return `${h}:${String(min).padStart(2, "0")}`;
}

// 番号丸バッジの色を order % N で cycle
const NUM_PALETTE = [
  "#6ac6e8", // sky blue
  "#4fd6a0", // mint green
  "#ffa94d", // orange
  "#a585e8", // purple
  "#ff6bb0", // pink
];

// アイテム1件をカード形式で描画 (mockup準拠)
function renderItemCard(d) {
  const isFav = state.favs.has(d.id);
  const isNested = !!d.parent;
  const cornerKey = ({うた:"uta",人形劇:"ningyo",アニメ:"anime",体操:"taiso",コーナー:"corner"})[d.corner] || "corner";
  const cornerEmoji = ({うた:"🎵",人形劇:"🎭",アニメ:"📺",体操:"🤸",コーナー:"✋"})[d.corner] || "🎶";

  // ハッシュタグ風chips: corner種別 + キャラ(最大2) + keywords(最大2) + mood
  const tagSrc = [];
  tagSrc.push(d.corner);
  if (d.characters && d.characters.length) {
    const charNames = d.characters.slice(0, 2).map(k => {
      // キャラkey→表示名 (CHAR_METAから)
      const meta = (CHAR_META || {})[k];
      return meta ? meta.name : k;
    });
    tagSrc.push(...charNames);
  }
  if (d.mood) tagSrc.push(d.mood);
  (d.keywords || []).slice(0, 2).forEach(k => tagSrc.push(k));
  const tags = [...new Set(tagSrc)].slice(0, 4);
  const tagHtml = tags.length ? `<div class="card-tags">${tags.map((t, i) => `<span class="card-tag ${i===0?'card-tag-genre':''}">${escapeHtml(t)}</span>`).join("")}</div>` : "";

  const snippetLine = d.snippet ? `<div class="card-snippet">${escapeHtml(d.snippet)}</div>` : "";
  const sourceBadge = d.source === "nhk" || d.source === "nhk+weekly"
    ? `<span class="card-source-badge src-nhk">NHK</span>`
    : (d.source_tag === "predicted" ? `<span class="card-source-badge">予測</span>` : "");

  // 番号と時刻
  const orderNum = d.order || (isNested ? "♪" : "?");
  const numColor = isNested
    ? "#cccccc"
    : (typeof orderNum === "number" ? NUM_PALETTE[(orderNum - 1) % NUM_PALETTE.length] : NUM_PALETTE[0]);
  const timeStr = estimateTime(d.airtime, d.order) || d.airtime || "";

  // 表示タイトル (うた/コーナー名は「」付き、その他はそのまま)
  const wrapInQuote = ["うた", "人形劇", "コーナー"].includes(d.corner);
  const displayTitle = wrapInQuote
    ? `<span class="card-title-prefix">${escapeHtml(d.corner)}</span>「${escapeHtml(d.title)}」`
    : escapeHtml(d.title);

  return `
    <div class="item-card ${isFav?"is-fav":""} ${isNested?"is-nested":""}" data-id="${d.id}">
      <div class="card-num">
        <div class="card-num-circle" style="background:${numColor}">${orderNum}</div>
        ${timeStr ? `<div class="card-num-time">${timeStr}</div>` : ""}
      </div>
      <div class="card-icon thumb-${cornerKey}">${cornerEmoji}</div>
      <div class="card-body">
        <div class="card-title">${displayTitle}${sourceBadge}</div>
        ${tagHtml}
        ${snippetLine}
      </div>
      <button class="card-fav ${isFav?"fav":""}" data-fav-id="${d.id}" aria-label="お気に入り">${isFav?"★":"☆"}</button>
    </div>`;
}

function renderCharChips() {
  const host = document.getElementById("char-chip-host");
  if (!host) return;
  // 検索中は非表示
  if (state.query) { host.innerHTML = ""; return; }

  // 現在のフィルタ範囲（show のみ）でキャラ集計
  const scope = data.filter(d => {
    if (state.filter === "okaasan" && d.show !== "okaasan") return false;
    if (state.filter === "inai" && d.show !== "inai") return false;
    if (state.filter === "fav" && !state.favs.has(d.id)) return false;
    return true;
  });
  const counts = {};
  scope.forEach(d => (d.characters || []).forEach(c => counts[c] = (counts[c]||0)+1));
  const chars = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0, 18);
  if (chars.length === 0) { host.innerHTML = ""; return; }
  host.innerHTML = `
    <div class="char-chips">
      ${state.selectedChar
        ? `<button class="char-chip active" data-char="">✕ クリア</button>` : ""}
      ${chars.map(([name, n]) => {
        const meta = CHAR_META[name] || {};
        const icon = meta.icon || "🎭";
        const isSel = state.selectedChar === name;
        return `<button class="char-chip ${isSel?"active":""}" data-char="${escapeHtml(name)}"><span class="ch-icon">${icon}</span>${escapeHtml(name)}<span class="ch-cnt">${n}</span></button>`;
      }).join("")}
    </div>
  `;
}

// ===== 絞り込みパネル =====
const DATE_RANGES = [
  ["all", "すべて"],
  ["week", "今週"],
  ["2w", "2週間"],
  ["month", "1ヶ月"],
];
const GENRE_LIST = ["うた", "人形劇", "アニメ", "体操", "コーナー"];

function matchesDateRange(dateStr, range) {
  if (range === "all") return true;
  const limits = { week: 7, "2w": 14, month: 30 };
  const days = limits[range];
  if (days === undefined) return true;
  const today = todayDate();
  const itemDate = new Date(dateStr);
  // 今日 ±N日 (未来放送も範囲内とする = NHK公式の先行データを活かす)
  const diffMs = Math.abs(itemDate - today);
  return diffMs / 86400000 <= days;
}

function renderFilterPanel() {
  const host = document.getElementById("filter-panel-host");
  if (!host) return;

  // ジャンル数: 「他のフィルタ全部かけて、ジャンルだけ未適用」状態の件数を出す
  const baseItems = data.filter(d => {
    if (state.filter === "okaasan" && d.show !== "okaasan") return false;
    if (state.filter === "inai" && d.show !== "inai") return false;
    if (state.filter === "fav" && !state.favs.has(d.id)) return false;
    if (state.selectedChar && (!d.characters || !d.characters.includes(state.selectedChar))) return false;
    if (!matchesDateRange(d.date, state.dateRange)) return false;
    return true;
  });
  const genreCounts = {};
  GENRE_LIST.forEach(g => genreCounts[g] = 0);
  baseItems.forEach(d => {
    if (genreCounts.hasOwnProperty(d.corner)) genreCounts[d.corner]++;
  });

  // インライン横スクロールchipバー (常時表示、トグル無し)
  const showReset = state.genres.size > 0;
  host.innerHTML = `
    <div class="genre-bar">
      ${GENRE_LIST.map(g => {
        const on = state.genres.has(g);
        const cnt = genreCounts[g];
        const dim = cnt === 0 ? "is-empty" : "";
        return `<button class="genre-chip ${on?'is-on':''} ${dim}" data-genre="${escapeHtml(g)}">
          ${escapeHtml(g)}<span class="genre-chip-count">${cnt}</span>
        </button>`;
      }).join('')}
      ${showReset ? `<button class="genre-chip is-reset" data-filter-reset="genres">× クリア</button>` : ''}
    </div>
  `;
}

// 週カレンダーstrip (mockup準拠: 1週間分だけ表示、前後の週ナビ)
function renderCalendar() {
  const host = document.getElementById("calendar-host");
  if (!host) return;
  // keyword/favビューではカレンダーを隠す
  if (state.view === "keyword" || state.view === "fav") {
    host.innerHTML = "";
    return;
  }
  const allDates = [...new Set(data.map(d => d.date))].sort();
  if (allDates.length === 0) { host.innerHTML = ""; return; }

  // 選択日の決定
  if (!state.selectedDate || !allDates.includes(state.selectedDate)) {
    const today = todayStrIso();
    state.selectedDate = allDates.includes(today) ? today : allDates[allDates.length - 1];
  }

  const dataDates = new Set(allDates);
  const sel = new Date(state.selectedDate);
  // 月始まりgrid (月=0,..,日=6) で sel の曜日position を計算
  const selColIdx = (sel.getDay() + 6) % 7;
  // sel を含む週の月曜日
  const weekStart = new Date(sel);
  weekStart.setDate(sel.getDate() - selColIdx);

  // 7日分生成
  const todayStr = todayStrIso();
  const cells = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    const wday = d.getDay();
    cells.push({
      day: d.getDate(),
      dateStr,
      hasData: dataDates.has(dateStr),
      isToday: dateStr === todayStr,
      isActive: dateStr === state.selectedDate,
      isSat: wday === 6,
      isSun: wday === 0,
    });
  }

  // 週ナビ可否 (データ範囲内に1日でもあれば可)
  const minDate = allDates[0];
  const maxDate = allDates[allDates.length - 1];
  const prevWeekEnd = new Date(weekStart);
  prevWeekEnd.setDate(prevWeekEnd.getDate() - 1);
  const nextWeekStart = new Date(weekStart);
  nextWeekStart.setDate(nextWeekStart.getDate() + 7);
  const canPrev = prevWeekEnd.toISOString().slice(0,10) >= minDate;
  const canNext = nextWeekStart.toISOString().slice(0,10) <= maxDate;

  // ヘッダ表示の年月: 選択中の日付の月を採用 (weekStartが前月のケースで違和感無くす)
  const headerYear = sel.getFullYear();
  const headerMonth = sel.getMonth() + 1;

  const cellsHtml = cells.map(c => {
    const cls = [
      "cal-day",
      c.hasData ? "cal-has-data" : "cal-no-data",
      c.isToday ? "cal-today" : "",
      c.isActive ? "cal-active" : "",
      c.isSat ? "cal-sat" : "",
      c.isSun ? "cal-sun" : "",
    ].filter(Boolean).join(" ");
    return `<button class="${cls}" data-date="${c.dateStr}">${c.day}</button>`;
  }).join("");

  host.innerHTML = `
    <div class="calendar calendar-week">
      <div class="cal-head">
        <button class="cal-nav" data-cal-step="-7" ${canPrev ? "" : "disabled"} aria-label="前の週">‹</button>
        <span class="cal-month">${headerYear}年 ${headerMonth}月</span>
        <button class="cal-nav" data-cal-step="7" ${canNext ? "" : "disabled"} aria-label="次の週">›</button>
      </div>
      <div class="cal-weekdays">
        <span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span class="sat">土</span><span class="sun">日</span>
      </div>
      <div class="cal-grid cal-grid-week">${cellsHtml}</div>
    </div>
  `;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

let searchDebounce;
$search.addEventListener("input", e => {
  state.query = e.target.value;
  render();
  renderRecentSearches();
  renderSuggestions();
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => pushRecent(state.query), 800);

$search.addEventListener("blur", () => {
  // 候補内のクリック処理を待ってから消す
  setTimeout(() => { document.getElementById("suggest-pop").style.display = "none"; }, 180);

function renderSuggestions() {
  const pop = document.getElementById("suggest-pop");
  if (!pop) return;
  const qRaw = state.query.trim();
  const q = normalize(qRaw);
  if (!q || q.length < 1) { pop.style.display = "none"; return; }
  const variants = expandQuery(qRaw);

  // 候補：曲タイトル一致 → keywords/snippet 一致 → 出演者 一致
  const titleHits = new Map();
  const keywordHits = new Map();
  const creditHits = new Map();
  for (const d of data) {
    const titleN = d._titleN || normalize(d.title);
    const matchTitle = variants.some(v => titleN.includes(v));
    if (matchTitle) {
      const cur = titleHits.get(d.title);
      if (!cur || d.date > cur.date) titleHits.set(d.title, d);
      continue;
    }
    const kwN = d._keywordsN || [];
    if (kwN.length) {
      const matchKw = kwN.some(kw => variants.some(v => kw.includes(v)));
      if (matchKw) {
        const cur = keywordHits.get(d.title);
        if (!cur || d.date > cur.date) keywordHits.set(d.title, d);
        continue;
      }
    }
    const crN = d._creditsN || [];
    if (crN.length) {
      const matchCr = crN.some(p => variants.some(v => p.includes(v)));
      if (matchCr) {
        const cur = creditHits.get(d.title);
        if (!cur || d.date > cur.date) creditHits.set(d.title, d);
      }
    }
  }

  const allItems = [
    ...[...titleHits.values()].slice(0, 5).map(d => ({d, kind: "曲名"})),
    ...[...keywordHits.values()].slice(0, 4).map(d => ({d, kind: "雰囲気"})),
    ...[...creditHits.values()].slice(0, 3).map(d => ({d, kind: "出演/作者"})),
  ];

  if (allItems.length === 0) { pop.style.display = "none"; return; }

  const escapeRe = s => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const highlightRe = new RegExp(`(${variants.filter(Boolean).map(escapeRe).join("|")})`, "gi");

  pop.innerHTML = allItems.map(({d, kind}) => {
    const hl = escapeHtml(d.title).replace(highlightRe, "<mark>$1</mark>");
    return `
      <div class="suggest-item" data-suggest="${escapeHtml(d.title)}">
        <span class="s-icon">🔍</span>
        <span class="s-title">${hl}</span>
        <span class="s-meta">${kind}</span>
      </div>
    `;
  }).join("");
  pop.style.display = "block";
}

document.addEventListener("click", e => {
  // Bottom nav: view切替
  const bnTab = e.target.closest(".bn-tab[data-view]");
  if (bnTab) {
    state.view = bnTab.dataset.view;
    // viewによって追加処理:
    //  - home: 今日に戻す
    //  - keyword: 検索バーにfocus、検索クエリは保持
    //  - fav: 検索クエリクリア
    if (state.view === "home") {
      const today = todayStrIso();
      const allDates = [...new Set(data.map(d => d.date))].sort();
      state.selectedDate = allDates.includes(today) ? today : allDates[allDates.length - 1] || null;
      state.query = "";
      $search.value = "";
    }
    if (state.view === "keyword") {
      setTimeout(() => $search && $search.focus(), 50);
    }
    if (state.view === "fav") {
      state.query = "";
      $search.value = "";
    }
    render();
    return;
  }

  // 絞り込みパネル: トグル (旧UIの残存処理だが影響なし)
  const filterToggle = e.target.closest("[data-filter-toggle]");
  if (filterToggle) {
    state.filterOpen = !state.filterOpen;
    renderFilterPanel();
    return;
  }
  // 絞り込みパネル: ジャンルchip(multi-select)
  const genreChip = e.target.closest("[data-genre]");
  if (genreChip) {
    const g = genreChip.dataset.genre;
    if (state.genres.has(g)) state.genres.delete(g); else state.genres.add(g);
    render();
    return;
  }
  // 絞り込みパネル: 放送日範囲(single-select)
  const rangeChip = e.target.closest("[data-range]");
  if (rangeChip) {
    state.dateRange = rangeChip.dataset.range;
    render();
    return;
  }
  // 絞り込みパネル: リセット
  const reset = e.target.closest("[data-filter-reset]");
  if (reset) {
    const k = reset.dataset.filterReset;
    if (k === "genres") state.genres = new Set();
    if (k === "dateRange") state.dateRange = "all";
    render();
    return;
  }

  const tag = e.target.closest("[data-recent]");
  if (tag) {
    state.query = tag.dataset.recent;
    $search.value = state.query;
    render();
    renderRecentSearches();
    return;
  }
  const dayTab = e.target.closest(".day-tab[data-date]");
  if (dayTab) {
    state.selectedDate = dayTab.dataset.date;
    render();
    return;
  }
  // カレンダー: 日付タップ
  const calDay = e.target.closest(".cal-day[data-date]");
  if (calDay) {
    state.selectedDate = calDay.dataset.date;
    // 表示中の月とずれていたら更新
    const d = new Date(calDay.dataset.date);
    state.calYear = d.getFullYear();
    state.calMonth = d.getMonth();
    render();
    return;
  }
  // カレンダー: 前後ナビ (data-cal-step は日数 ±7)
  const calStep = e.target.closest("[data-cal-step]");
  if (calStep && !calStep.disabled) {
    const step = parseInt(calStep.dataset.calStep, 10);
    const cur = new Date(state.selectedDate);
    cur.setDate(cur.getDate() + step);
    state.selectedDate = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,"0")}-${String(cur.getDate()).padStart(2,"0")}`;
    render();
    return;
  }
  const favShort = e.target.closest("[data-fav-title]");
  if (favShort) {
    state.query = favShort.dataset.favTitle;
    $search.value = state.query;
    render();
    renderRecentSearches();
    return;
  }
  const sug = e.target.closest("[data-suggest]");
  if (sug) {
    state.query = sug.dataset.suggest;
    $search.value = state.query;
    document.getElementById("suggest-pop").style.display = "none";
    render();
    renderRecentSearches();
    return;
  }
  const charChip = e.target.closest("[data-char]");
  if (charChip) {
    const c = charChip.dataset.char;
    state.selectedChar = c ? c : null;
    render();
  }
});

// 旧 .pill (filter pills) は撤去済み — ハンドラ無し

$list.addEventListener("click", e => {
  const star = e.target.closest("[data-fav-id]");
  if (star) {
    e.stopPropagation();
    const id = +star.dataset.favId;
    state.favs.has(id) ? state.favs.delete(id) : state.favs.add(id);
    render();
    return;
  }
  const row = e.target.closest("[data-id]");
  if (row) openModal(+row.dataset.id);
});

function openModal(id) {
  const d = data.find(x => x.id === id);
  if (!d) return;
  document.getElementById("modal-title").textContent = d.title;
  document.getElementById("modal-show").textContent = `${SHOWS[d.show].name} ・ ${d.corner}${d.parent ? ' ・ ' + d.parent + '内' : ''}`;
  document.getElementById("modal-date").textContent = `${fmtDate(d.date)} ${d.airtime} 放送回 ・ #${d.order || "?"}曲目`;
  document.getElementById("modal-time").textContent = d.offset || (d.order ? `${d.order}曲目` : "—");
  document.getElementById("modal").dataset.show = d.show;

  // 詳細メタ情報（subcategory / credits / mood / snippet / 放送履歴）
  const detailParts = [];

  if (d.subcategory && d.subcategory !== d.corner) {
    detailParts.push(`<div class="meta-line"><span class="meta-label">分類</span><span>${escapeHtml(d.subcategory)}</span></div>`);
  }

  if (d.credits) {
    const labelMap = {
      lyrics: "作詞", music: "作曲", arrange: "編曲",
      vocals: "歌唱", cast: "出演", anim: "アニメ/イラスト",
      original: "原作", script: "脚本", director: "演出",
      choreo: "振付", bgm: "音楽", other: "その他",
    };
    for (const [k, v] of Object.entries(d.credits)) {
      if (!v || !v.length) continue;
      const label = labelMap[k] || k;
      detailParts.push(`<div class="meta-line"><span class="meta-label">${label}</span><span>${escapeHtml(v.join("、"))}</span></div>`);
    }
  }

  if (d.mood) {
    detailParts.push(`<div class="meta-line"><span class="meta-label">ムード</span><span>${escapeHtml(d.mood)}</span></div>`);
  }
  // 歌い出しは別途 lyric-hero で大きく表示するのでここでは省略

  // 同じ曲の他の放送日
  const sameTitle = data.filter(x => x.title === d.title && x.id !== d.id)
    .sort((a, b) => b.date.localeCompare(a.date))
    .slice(0, 10);
  if (sameTitle.length > 0) {
    const chips = sameTitle.map(x =>
      `<button class="other-date-chip" data-jump-id="${x.id}">${fmtDate(x.date)}</button>`
    ).join("");
    detailParts.push(`<div class="meta-line other-dates"><span class="meta-label">他の放送日</span><div class="other-date-list">${chips}</div></div>`);
  }

  const q = encodeURIComponent(d.title + " " + SHOWS[d.show].name);
  const qYTShort = encodeURIComponent(d.title + " NHK");  // 公式チャンネル優先のため
  const qLyric = encodeURIComponent(d.title);
  // NHK公式YouTubeチャンネル名
  const nhkChannel = d.show === "inai"
    ? "https://www.youtube.com/@nhk-inaiinaibaa/search?query=" + qLyric
    : "https://www.youtube.com/@nhk_okaasantoissho/search?query=" + qLyric;

  // 歌い出しヒーローブロック（snippets配列 or snippet単体）
  const snipList = (d.snippets && d.snippets.length) ? d.snippets : (d.snippet ? [d.snippet] : []);
  const lyricHero = snipList.length
    ? `<div class="lyric-hero">
         <div class="lyric-label">${snipList.length > 1 ? "印象的なフレーズ" : "歌い出し"}</div>
         ${snipList.map(s => `<div class="lyric-text">${escapeHtml(s)}</div>`).join("")}
       </div>` : "";

  // 歌のテーマ（AI生成、著作権セーフな描写）
  if (d.theme) {
    detailParts.unshift(`<div class="meta-line"><span class="meta-label">どんな歌</span><span>${escapeHtml(d.theme)}</span></div>`);
  }

  document.getElementById("modal-actions").innerHTML = `
    ${lyricHero}
    ${detailParts.length ? `<div class="meta-block">${detailParts.join("")}</div>` : ""}
    <div class="action-btn" style="background: rgba(255,138,61,0.08); cursor: default;">
      <span class="action-icon icon-tv">📺</span>
      <div>
        <div style="font-size:14px; color:var(--text-dim); margin-bottom:2px;">録画機の操作手順</div>
        <div style="font-size:13px; color:var(--text);">番組表 → ${fmtDate(d.date)} → ${SHOWS[d.show].name}<br>→ ${d.order || "?"}曲目（${d.airtime}〜）</div>
      </div>
    </div>
    <a class="action-btn" href="${nhkChannel}" target="_blank" rel="noopener">
      <span class="action-icon icon-yt">▶</span>NHK公式YouTubeで探す
    </a>
    <a class="action-btn" href="https://www.youtube.com/results?search_query=${qYTShort}" target="_blank" rel="noopener">
      <span class="action-icon icon-yt" style="background:rgba(255,68,68,0.12);">▶</span>YouTube全体で探す
    </a>
    <a class="action-btn" href="https://www.uta-net.com/search/?Aselect=2&Bselect=4&Keyword=${qLyric}" target="_blank" rel="noopener">
      <span class="action-icon icon-lyrics">📝</span>歌詞を探す（うたネット）
    </a>
    <a class="action-btn" href="https://open.spotify.com/search/${q}" target="_blank" rel="noopener">
      <span class="action-icon icon-spo">🎧</span>Spotifyで聴く
    </a>
    <button class="action-btn" id="share-btn" type="button" data-share-id="${d.id}" style="border:none;width:100%;text-align:left;font:inherit;">
      <span class="action-icon" style="background:rgba(106,198,232,0.2);color:#3a9dc8;">📤</span>家族にシェア
    </button>
  `;

  document.getElementById("modal-backdrop").classList.add("open");
}

document.getElementById("modal-backdrop").addEventListener("click", async e => {
  // 他の放送日へジャンプ
  const jump = e.target.closest("[data-jump-id]");
  if (jump) {
    document.getElementById("modal-backdrop").classList.remove("open");
    const id = +jump.dataset.jumpId;
    setTimeout(() => openModal(id), 220);
    return;
  }
  // 共有ボタン
  const share = e.target.closest("[data-share-id]");
  if (share) {
    e.stopPropagation();
    const id = +share.dataset.shareId;
    const d = data.find(x => x.id === id);
    if (!d) return;
    const url = `${location.origin}${location.pathname}#${encodeURIComponent(d.title)}`;
    const text = `「${d.title}」（${SHOWS[d.show].name} ${fmtDate(d.date)} ${d.airtime}〜 #${d.order||"?"}曲目）`;
    if (navigator.share) {
      try {
        await navigator.share({ title: "あずきサーチ", text, url });
      } catch (e) { /* キャンセル時は何もしない */ }
    } else {
      try {
        await navigator.clipboard.writeText(`${text}\n${url}`);
        share.querySelector("span:last-child").textContent = "コピーしたよ✓";
        setTimeout(() => location.reload(), 1500);
      } catch (e) {
        alert(`${text}\n${url}`);
      }
    }
    return;
  }
  if (e.target.id === "modal-backdrop") {
    document.getElementById("modal-backdrop").classList.remove("open");
  }
});

// 音声検索（iOS Safari / Chrome が webkitSpeechRecognition 対応）
(function setupVoiceSearch() {
  const btn = document.getElementById("voice-btn");
  if (!btn) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    btn.style.display = "none";
    return;
  }
  const recog = new SR();
  recog.lang = "ja-JP";
  recog.interimResults = true;
  recog.continuous = false;

  let listening = false;

  btn.addEventListener("click", () => {
    if (listening) {
      recog.stop();
      return;
    }
    try {
      recog.start();
    } catch (e) {
      // すでに開始中の場合を無視
    }
  });

  recog.onstart = () => {
    listening = true;
    btn.classList.add("listening");
    btn.textContent = "●";
  };
  recog.onend = () => {
    listening = false;
    btn.classList.remove("listening");
    btn.textContent = "🎤";
  };
  recog.onresult = (ev) => {
    let text = "";
    for (let i = ev.resultIndex; i < ev.results.length; i++) {
      text += ev.results[i][0].transcript;
    }
    text = text.trim();
    if (!text) return;
    state.query = text;
    $search.value = text;
    render();
    renderRecentSearches();
  };
  recog.onerror = (ev) => {
    console.warn("音声認識エラー:", ev.error);
    listening = false;
    btn.classList.remove("listening");
    btn.textContent = "🎤";
  };
})();

// URL hash（#曲名）で検索状態復元
(function handleDeepLink() {
  const hash = location.hash.replace(/^#/, "");
  if (hash) {
    try {
      const decoded = decodeURIComponent(hash);
      if (decoded) {
        state.query = decoded;
        const el = document.getElementById("search");
        if (el) el.value = decoded;
      }
    } catch (e) { /* ignore */ }
  }
})();

// キャラ メタデータ読み込み（characters.json）
async function loadCharsMeta() {
  try {
    const res = await fetch("characters.json", { cache: "no-store" });
    if (!res.ok) return;
    const json = await res.json();
    (json.characters || []).forEach(c => {
      CHAR_META[c.key] = { icon: c.icon || "🎭", show: c.show };
    });
  } catch (e) { /* ignore */ }
}

// データ読み込み
async function loadData() {
  await loadCharsMeta();
  try {
    const res = await fetch("data.json", { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    data = json.items.map(x => ({ ...x }));
    broadcastMeta = json.broadcast_meta || { okaasan: {}, inai: {} };
    precomputeSearchFields(data);
    // 既存お気に入り状態を反映
    state.favs = new Set(data.filter(d => d.fav).map(d => d.id));
    // 生成時刻バッジ
    const stamp = json.generated_at ? new Date(json.generated_at).toLocaleString("ja-JP") : "";
    if (stamp) {
      const badge = document.createElement("div");
      badge.style.cssText = "font-size:11px;color:var(--text-dim);margin-top:6px;text-align:right;";
      badge.textContent = `📡 最終更新: ${stamp}（${json.source || "unknown"}）`;
      document.querySelector("header").appendChild(badge);
    }
  } catch (e) {
    console.warn("data.json読み込み失敗、フォールバック使用:", e);
    data = FALLBACK_DATA;
    state.favs = new Set(data.filter(d => d.fav).map(d => d.id));
    precomputeSearchFields(data);
  }
  render();
  renderRecentSearches();
}

loadData();

// Service Worker 登録（PWA化）
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(err => {
      console.warn("SW登録失敗:", err);
    });
  });
}
