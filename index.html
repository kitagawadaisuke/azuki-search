<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ff8a3d">
<meta name="description" content="NHK Eテレ「おかあさんといっしょ」「いないいないばぁ」の録画から「あの曲どこ？」を最速検索する索引アプリ">
<title>あずきサーチ</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="あずき">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<style>
  :root {
    /* 温かくて明るい、Eテレカラフル感 */
    --bg: #fff7e8;
    --surface: #ffffff;
    --surface-2: #fff0d6;
    --text: #3d2817;
    --text-dim: #8f7357;
    --accent: #ff8a3d;         /* あたたかオレンジ */
    --accent-2: #ff5f9c;        /* いちごピンク */
    --okaasan: #ffa94d;         /* おかあさんといっしょ：たまご黄色 */
    --inai: #ff6bb0;            /* いないいないばあ：ピンク */
    --mint: #4fd6a0;            /* アクセント：ミント */
    --sky: #6ac6e8;             /* アクセント：空色 */
    --shadow-soft: 0 2px 8px rgba(255, 138, 61, 0.12);
    --shadow-card: 0 3px 16px rgba(61, 40, 23, 0.08);
    --safe-bottom: env(safe-area-inset-bottom);
    --safe-top: env(safe-area-inset-top);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }

  body {
    background:
      radial-gradient(ellipse at top left, rgba(255, 170, 80, 0.15), transparent 50%),
      radial-gradient(ellipse at top right, rgba(255, 107, 176, 0.12), transparent 50%),
      var(--bg);
    background-attachment: fixed;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Maru Gothic ProN", "Hiragino Sans", "Yu Gothic UI", sans-serif;
    min-height: 100vh;
    padding-top: var(--safe-top);
    padding-bottom: calc(20px + var(--safe-bottom));
    line-height: 1.5;
  }

  header {
    padding: 20px 20px 14px;
    position: sticky;
    top: 0;
    background: linear-gradient(180deg, var(--bg) 0%, rgba(255, 247, 232, 0.92) 100%);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    z-index: 10;
    border-bottom: 1px solid rgba(255, 138, 61, 0.08);
  }

  h1 {
    font-size: 26px;
    margin: 0 0 14px;
    font-weight: 900;
    letter-spacing: 0.01em;
    text-align: center;
    color: var(--text);
    text-shadow: 0 1px 0 #fff, 0 2px 8px rgba(255, 138, 61, 0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  h1 .azuki-side {
    width: 52px;
    height: auto;
    max-height: 68px;
    object-fit: contain;
    flex-shrink: 0;
    filter: drop-shadow(0 2px 4px rgba(61, 40, 23, 0.15));
  }
  h1 .azuki-side.flip {
    transform: scaleX(-1);
  }
  h1 .title-text {
    line-height: 1;
  }

  .search-wrap {
    position: relative;
  }
  .search-box {
    width: 100%;
    background: var(--surface);
    border: 2px solid transparent;
    border-radius: 18px;
    padding: 14px 50px 14px 20px;
    color: var(--text);
    font-size: 17px;
    outline: none;
    box-shadow: var(--shadow-soft);
    text-align: center;
    transition: all 0.15s;
  }
  .voice-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    border: none;
    cursor: pointer;
    font-size: 18px;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 6px rgba(255, 95, 156, 0.35);
    transition: transform 0.1s;
  }
  .voice-btn:active { transform: translateY(-50%) scale(0.92); }

  /* 検索候補サジェスト */
  .suggest-pop {
    position: absolute;
    left: 0;
    right: 0;
    top: calc(100% + 6px);
    background: var(--surface);
    border-radius: 16px;
    box-shadow: 0 8px 28px rgba(61,40,23,0.18);
    z-index: 20;
    overflow: hidden;
    max-height: 280px;
    overflow-y: auto;
  }
  .suggest-item {
    padding: 11px 18px;
    cursor: pointer;
    border-bottom: 1px solid rgba(143,115,87,0.06);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    transition: background 0.1s;
  }
  .suggest-item:last-child { border-bottom: none; }
  .suggest-item:hover, .suggest-item:active { background: var(--surface-2); }
  .suggest-item .s-icon { font-size: 14px; opacity: 0.6; }
  .suggest-item .s-title { font-weight: 700; flex: 1; }
  .suggest-item .s-meta { font-size: 11px; color: var(--text-dim); }
  .suggest-item mark {
    background: rgba(255,138,61,0.25);
    color: var(--text);
    padding: 0 2px;
    border-radius: 3px;
  }
  .voice-btn.listening {
    background: linear-gradient(135deg, #ff4444 0%, #ff6b9d 100%);
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 2px 6px rgba(255, 68, 68, 0.5); }
    50% { box-shadow: 0 2px 6px rgba(255, 68, 68, 0.5), 0 0 0 12px rgba(255, 68, 68, 0); }
  }
  .search-box:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(255, 138, 61, 0.15);
  }
  .search-box::placeholder { color: var(--text-dim); }

  .filter-pills {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
    justify-content: center;
  }
  .filter-pills::-webkit-scrollbar { display: none; }
  .pill {
    flex: 0 0 auto;
    padding: 9px 16px;
    border-radius: 999px;
    background: var(--surface);
    color: var(--text-dim);
    font-size: 14px;
    font-weight: 700;
    border: 1.5px solid rgba(143, 115, 87, 0.15);
    cursor: pointer;
    box-shadow: var(--shadow-soft);
    transition: all 0.15s;
  }
  .pill.active {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 4px 10px rgba(255, 95, 156, 0.3);
  }

  main {
    padding: 12px 16px;
  }

  .section-title {
    font-size: 13px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 20px 4px 10px;
    font-weight: 700;
  }

  .card {
    background: var(--surface);
    border-radius: 18px;
    padding: 16px 18px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    box-shadow: var(--shadow-card);
    transition: transform 0.1s, background 0.15s;
    min-height: 72px;
  }
  .card:active { transform: scale(0.98); background: var(--surface-2); }

  .show-badge {
    flex: 0 0 4px;
    height: 48px;
    border-radius: 4px;
    background: var(--okaasan);
  }
  .card[data-show="inai"] .show-badge { background: var(--inai); }

  .card-main {
    flex: 1;
    min-width: 0;
  }
  .song-title {
    font-size: 18px;
    font-weight: 700;
    margin: 0 0 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .song-meta {
    font-size: 13px;
    color: var(--text-dim);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .show-name { color: var(--okaasan); font-weight: 600; }
  .card[data-show="inai"] .show-name { color: var(--inai); }

  .star {
    flex: 0 0 auto;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--surface-2);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 22px;
    color: var(--text-dim);
    transition: all 0.15s;
  }
  .star:active { transform: scale(0.9); }
  .star.fav { color: var(--accent); background: rgba(255,184,77,0.15); }

  /* Detail modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    width: 100%;
    border-radius: 24px 24px 0 0;
    padding: 28px 24px calc(32px + var(--safe-bottom));
    animation: slideUp 0.25s ease;
    max-height: 85vh;
    overflow-y: auto;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--surface-2);
    border-radius: 2px;
    margin: -12px auto 20px;
  }

  .modal h2 {
    font-size: 26px;
    margin: 0 0 4px;
    font-weight: 700;
  }
  .modal-show {
    font-size: 14px;
    margin-bottom: 24px;
    color: var(--okaasan);
    font-weight: 600;
  }
  .modal[data-show="inai"] .modal-show { color: var(--inai); }

  .time-block {
    background: linear-gradient(135deg, rgba(255, 138, 61, 0.08) 0%, rgba(255, 107, 176, 0.06) 100%);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
    border: 1.5px solid rgba(255, 138, 61, 0.15);
  }
  .time-date {
    font-size: 18px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .time-jump {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }
  .time-label {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
    letter-spacing: 0.05em;
  }

  .action-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .action-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 16px 18px;
    background: var(--surface-2);
    border: none;
    border-radius: 14px;
    color: var(--text);
    font-size: 16px;
    font-weight: 600;
    text-align: left;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
  }
  .action-btn:active { background: var(--surface-2); }

  .meta-block {
    background: rgba(255, 138, 61, 0.05);
    border: 1px solid rgba(255, 138, 61, 0.15);
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 14px;
  }
  .meta-line {
    display: flex;
    gap: 10px;
    padding: 5px 0;
    font-size: 13px;
    border-bottom: 1px dashed rgba(143, 115, 87, 0.12);
    align-items: baseline;
  }
  .meta-line:last-child { border-bottom: none; }
  .meta-label {
    flex: 0 0 76px;
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .meta-line span:last-child { flex: 1; color: var(--text); }
  .meta-line.other-dates {
    display: block;
  }
  .meta-line.other-dates .meta-label {
    flex: unset;
    display: block;
    margin-bottom: 6px;
  }
  .other-date-list {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .other-date-chip {
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 999px;
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid rgba(255, 138, 61, 0.2);
    cursor: pointer;
    font-weight: 600;
  }
  .other-date-chip:active { background: var(--accent); color: #fff; }
  .action-icon {
    flex: 0 0 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .icon-tv { background: rgba(255,184,77,0.2); color: var(--accent); }
  .icon-yt { background: rgba(255,68,68,0.2); color: #ff5555; }
  .icon-spo { background: rgba(30,215,96,0.2); color: #1ed760; }
  .icon-lyrics { background: rgba(139,92,246,0.18); color: #7c4dff; }

  .lyric-hero {
    background: linear-gradient(135deg, rgba(255,138,61,0.1) 0%, rgba(255,95,156,0.08) 100%);
    border: 1.5px solid rgba(255,138,61,0.2);
    border-radius: 18px;
    padding: 18px 20px;
    margin-bottom: 14px;
    text-align: center;
  }
  .lyric-hero .lyric-label {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .lyric-hero .lyric-text {
    font-size: 19px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.5;
    letter-spacing: 0.02em;
    margin: 4px 0;
  }
  .lyric-hero .lyric-text::before { content: "♪ "; color: var(--accent); }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-emoji { font-size: 48px; margin-bottom: 12px; }

  /* Bottom nav */
  nav.bottom {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid rgba(143, 115, 87, 0.1);
    padding: 8px 0 calc(8px + var(--safe-bottom));
    display: flex;
    z-index: 50;
    box-shadow: 0 -4px 20px rgba(61, 40, 23, 0.06);
  }
  .nav-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-dim);
    padding: 8px 4px;
    font-size: 11px;
    font-weight: 600;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 22px; }

  /* Quick stats */
  .repeat-hint {
    font-size: 12px;
    color: var(--accent);
    background: rgba(255,184,77,0.1);
    padding: 4px 10px;
    border-radius: 999px;
    display: inline-block;
    margin-top: 4px;
  }

  .recent-searches {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }
  .recent-tag {
    font-size: 13px;
    padding: 6px 12px;
    background: var(--surface-2);
    border-radius: 999px;
    color: var(--text);
    border: none;
    cursor: pointer;
  }
  .recent-tag::before { content: "🕐 "; opacity: 0.6; }

  .group-header {
    font-size: 16px;
    font-weight: 700;
    margin: 16px 4px 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .group-count {
    font-size: 12px;
    background: var(--accent);
    color: #1a1a2e;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 700;
  }
  .group-card {
    background: var(--surface);
    border-radius: 16px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .group-row {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: background 0.15s;
  }
  .group-row:last-child { border-bottom: none; }
  .group-row:active { background: var(--surface-2); }
  .group-row .when {
    flex: 1;
    font-size: 15px;
    font-weight: 600;
  }
  .group-row .when small {
    display: block;
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 400;
    margin-top: 2px;
  }
  .group-row .at {
    font-family: -apple-system, sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }

  /* 日別タイムライン表示 */
  .day-block {
    margin-bottom: 24px;
  }
  .day-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin: 8px 4px 10px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--surface-2);
  }
  .day-label {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .day-label.today { color: var(--accent); }
  .day-sub {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 600;
  }
  .day-show-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: rgba(255,184,77,0.15);
    color: var(--accent);
    margin-left: auto;
    font-weight: 600;
  }

  .timeline {
    background: var(--surface);
    border-radius: 20px;
    padding: 6px 0;
    overflow: hidden;
    box-shadow: var(--shadow-card);
  }
  .timeline-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    cursor: pointer;
    transition: background 0.12s;
    border-bottom: 1px solid rgba(143, 115, 87, 0.08);
  }
  .timeline-row:last-child { border-bottom: none; }
  .timeline-row:active { background: var(--surface-2); }

  .seq {
    flex: 0 0 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--surface-2);
    color: var(--accent);
    font-size: 14px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    font-variant-numeric: tabular-nums;
    border: 2px solid rgba(255, 138, 61, 0.2);
  }
  .timeline-row.is-fav .seq {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    color: #fff;
    border-color: transparent;
  }
  .timeline-row.is-nested {
    padding-left: 36px;
    background: rgba(255,255,255,0.015);
  }
  .timeline-row.is-nested .seq {
    background: transparent;
    border: 1px dashed var(--text-dim);
    color: var(--accent);
  }
  .row-main {
    flex: 1;
    min-width: 0;
  }
  .row-title {
    font-size: 16px;
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .row-tag {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .row-snippet {
    font-size: 12px;
    color: var(--accent);
    margin-top: 4px;
    font-weight: 600;
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .predicted-badge {
    display: inline-block;
    font-size: 9px;
    padding: 1px 6px;
    background: rgba(106,198,232,0.18);
    color: #3a9dc8;
    border-radius: 999px;
    margin-left: 4px;
    vertical-align: middle;
    font-weight: 700;
  }
  .corner-uta { color: #e67a2e; font-weight: 700; }
  .corner-ningyo { color: #d94e8d; font-weight: 700; }
  .corner-anime { color: #3a9dc8; font-weight: 700; }
  .corner-taiso { color: #2eb580; font-weight: 700; }
  .corner-corner { color: #8a5cd8; font-weight: 700; }

  .row-fav {
    flex: 0 0 36px;
    height: 36px;
    border-radius: 50%;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
  }
  .row-fav.fav { color: var(--accent); }

  /* 日付タブ（横スクロール） */
  .day-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 6px 0 14px;
    scrollbar-width: none;
    -ms-overflow-style: none;
    scroll-snap-type: x mandatory;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex: 0 0 auto;
    min-width: 62px;
    padding: 10px 12px;
    border-radius: 16px;
    background: var(--surface);
    color: var(--text-dim);
    border: 2px solid rgba(143, 115, 87, 0.1);
    font-weight: 700;
    text-align: center;
    line-height: 1.2;
    cursor: pointer;
    scroll-snap-align: start;
    box-shadow: var(--shadow-soft);
    transition: all 0.15s;
  }
  .day-tab .dt-wd {
    font-size: 11px;
    opacity: 0.7;
    display: block;
  }
  .day-tab .dt-d {
    font-size: 20px;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
  }
  .day-tab .dt-sub {
    font-size: 10px;
    opacity: 0.7;
    margin-top: 2px;
    display: block;
    font-weight: 600;
  }

// =================== Search Helpers ===================
// ひらがな↔カタカナ正規化（「ぱぴぷぺぽ」「パピプペポ」両対応）
function normalize(s) {
  return s.toLowerCase()
    .replace(/[\u30a1-\u30f6]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60)) // カナ→ひら
    .replace(/[ー－〜！？\s・]/g, ""); // 記号・空白除去
}

// 子供番組でよく使われる漢字↔ひらがな対応辞書（検索ゆらぎ対応）
// 「太鼓」「たいこ」「タイコ」どれでもヒットする
const KANJI_KANA_MAP = {
  "太鼓":"たいこ","大":"おおき","小":"ちい","歌":"うた","虹":"にじ","花":"はな",
  "海":"うみ","山":"やま","川":"かわ","空":"そら","星":"ほし","月":"つき",
  "太陽":"たいよう","雨":"あめ","雪":"ゆき","風":"かぜ","犬":"いぬ","猫":"ねこ",
  "鳥":"とり","魚":"さかな","虫":"むし","木":"き","葉":"はっぱ",
  "赤":"あか","青":"あお","黄色":"きいろ","緑":"みどり","黒":"くろ","白":"しろ",
  "電車":"でんしゃ","車":"くるま","音":"おと","光":"ひかり","時":"とき",
  "手":"て","足":"あし","目":"め","口":"くち","耳":"みみ","顔":"かお",
  "朝":"あさ","夜":"よる","昼":"ひる","今":"いま","体操":"たいそう",
  "肉":"にく","魚":"さかな","野菜":"やさい","果物":"くだもの","料理":"りょうり",
  "友達":"ともだち","家族":"かぞく","母":"かあさん","父":"とうさん",
  "歩":"あるく","走":"はしる","踊":"おどる","歌":"うた","笑":"わら",
  "蛙":"かえる","兎":"うさぎ","熊":"くま","象":"ぞう","亀":"かめ",
  "船":"ふね","飛行機":"ひこうき","バス":"ばす","電車":"でんしゃ"
};

function expandQuery(q) {
  if (!q) return [q];
  const variants = new Set([q]);
  for (const [k, v] of Object.entries(KANJI_KANA_MAP)) {
    if (q.includes(k)) variants.add(q.split(k).join(v));
    if (q.includes(v)) variants.add(q.split(v).join(k));
  }
  return [...variants].map(normalize);
}

// 検索履歴（localStorage）
function getRecent() {
  try { return JSON.parse(localStorage.getItem("recent") || "[]"); }
  catch { return []; }
}
function pushRecent(q) {
  if (!q.trim()) return;
  const r = getRecent().filter(x => x !== q);
  r.unshift(q);
  localStorage.setItem("recent", JSON.stringify(r.slice(0, 5)));
}

// =================== State ===================
const state = {
  filter: "all",
  query: "",
  selectedDate: null,  // タブで選択中の日付
  favs: new Set(data.filter(d => d.fav).map(d => d.id)),
};

// =================== Render ===================
const $list = document.getElementById("list");
const $search = document.getElementById("search");
const $sectionTitle = document.getElementById("section-title");

function todayDate() {
  // ブラウザのローカルタイムで「今日の0時」を返す
  const now = new Date();
  return new Date(now.getFullYear(), now.getMonth(), now.getDate());
}

function fmtDate(iso) {
  const d = new Date(iso);
  const today = todayDate();
  const diff = Math.floor((today - d) / (1000 * 60 * 60 * 24));
  if (diff === 0) return "今日";
  if (diff === 1) return "きのう";
  if (diff === -1) return "あした";
  const w = ["日","月","火","水","木","金","土"][d.getDay()];
  return `${d.getMonth()+1}/${d.getDate()}(${w})`;
}

function todayStrIso() {
  const t = todayDate();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}-${String(t.getDate()).padStart(2,"0")}`;
}

function searchMatches(d, q) {
  if (!q) return true;
  const variants = expandQuery(q);
  const creditsFlat = d.credits
    ? Object.values(d.credits).flat().map(normalize)
    : [];
  const snippetsAll = (d.snippets && d.snippets.length) ? d.snippets : (d.snippet ? [d.snippet] : []);
  const haystack = [
    normalize(d.title),
    normalize(d.corner),
    d.subcategory ? normalize(d.subcategory) : "",
    d.mood ? normalize(d.mood) : "",
    d.theme ? normalize(d.theme) : "",
    ...snippetsAll.map(normalize),
    ...(d.keywords || []).map(normalize),
    ...creditsFlat,
  ].join("|");
  for (const v of variants) {
    if (haystack.includes(v)) return true;
  }
  return false;
}

function render() {
  const qRaw = state.query.trim();
  const q = normalize(qRaw);
  let items = data.filter(d => {
    if (state.filter === "okaasan" && d.show !== "okaasan") return false;
    if (state.filter === "inai" && d.show !== "inai") return false;
    if (state.filter === "fav" && !state.favs.has(d.id)) return false;
    if (!searchMatches(d, q)) return false;
    return true;
  });

  renderDayTabs();
  renderFavShortcuts();

  items.sort((a, b) => b.date.localeCompare(a.date) || a.airtime.localeCompare(b.airtime));

  if (items.length === 0) {
    $list.innerHTML = `<div class="empty"><div class="empty-emoji">🔎</div>みつからなかったよ<br><small>カナ・ひらがな両方ためしてみてね</small></div>`;
    return;
  }

  // 検索中は「曲タイトルでグループ化」して放送回をすべて並べる（コア体験）
  if (q) {
    const groups = {};
    items.forEach(d => {
      const k = `${d.title}|${d.show}`;
      if (!groups[k]) groups[k] = { title: d.title, show: d.show, items: [] };
      groups[k].items.push(d);
    });
    const groupList = Object.values(groups).sort((a, b) =>
      b.items[0].date.localeCompare(a.items[0].date)
    );

    $list.innerHTML = groupList.map(g => `
      <div class="group-header">
        <span style="color: var(--${g.show === "inai" ? "inai" : "okaasan"})">●</span>
        <span>${escapeHtml(g.title)}</span>
        <span class="group-count">${g.items.length}回</span>
      </div>
      <div class="group-card">
        ${g.items.map(d => `
          <div class="group-row" data-id="${d.id}">
            <div class="when">
              ${fmtDate(d.date)} ${d.airtime}〜
              <small>${SHOWS[d.show].name} ・ ${escapeHtml(d.corner)}</small>
            </div>
            <div class="at">⏱ ${d.offset}</div>
            <button class="star ${state.favs.has(d.id) ? "fav" : ""}" data-fav-id="${d.id}" aria-label="お気に入り" style="width:36px;height:36px;font-size:18px;">${state.favs.has(d.id) ? "★" : "☆"}</button>
          </div>
        `).join("")}
      </div>
    `).join("");
    return;
  }

  // 通常表示：日付タブで選択された1日分のタイムラインのみ表示
  const byDay = {};
  items.forEach(d => {
    const k = `${d.date}|${d.show}`;
    if (!byDay[k]) byDay[k] = { date: d.date, show: d.show, items: [] };
    byDay[k].items.push(d);
  });
  Object.values(byDay).forEach(g => g.items.sort((a, b) => (a.order || 0) - (b.order || 0)));

  const selected = state.selectedDate;
  const dayGroups = Object.values(byDay).filter(g => g.date === selected)
    .sort((a, b) => a.show < b.show ? -1 : 1);

  if (dayGroups.length === 0) {
    $list.innerHTML = `<div class="empty"><div class="empty-emoji">📅</div>${selected ? fmtDate(selected) : "この日"}の放送データなし<br><small>別の日を選んでみてね</small></div>`;
    return;
  }

  const weekday = ["日","月","火","水","木","金","土"][new Date(selected).getDay()];
  const dateLabel = fmtDate(selected);
  const dateSub = `${selected.slice(5).replace("-","/")} (${weekday})`;

  $list.innerHTML = `
    <div class="selected-day-header">
      <span class="big">${dateLabel}</span>
      <span class="sub">${dateSub}</span>
    </div>
  ` + dayGroups.map(g => `
    <div class="day-block">
      <div class="day-header" style="margin-top:4px;padding-bottom:4px;">
        <span class="day-show-badge" style="margin-left:0;background:${g.show==="inai"?"rgba(255,107,157,0.18)":"rgba(255,184,77,0.15)"};color:${g.show==="inai"?"var(--inai)":"var(--accent)"};">${SHOWS[g.show].name}</span>
      </div>
      <div class="timeline">
        ${g.items.map(d => {
          const isFav = state.favs.has(d.id);
          const cornerClass = ({うた:"corner-uta",人形劇:"corner-ningyo",アニメ:"corner-anime",体操:"corner-taiso",コーナー:"corner-corner"})[d.corner] || "corner-corner";
          const parentTag = d.parent ? ` ・ ${escapeHtml(d.parent)}内` : "";
          const isNested = !!d.parent;
          const moodChip = d.mood ? `<span class="mood-chip">${escapeHtml(d.mood)}</span>` : "";
          const predBadge = d.source_tag === "predicted" ? `<span class="predicted-badge" title="予測データ（実放送記録未取得）">予測</span>` : "";
          const snippetLine = d.snippet ? `<div class="row-snippet">♪ ${escapeHtml(d.snippet)}</div>` : "";
          return `
          <div class="timeline-row ${isFav?"is-fav":""} ${isNested?"is-nested":""}" data-id="${d.id}">
            <div class="seq">${isNested ? "♪" : (d.order || "?")}</div>
            <div class="row-main">
              <div class="row-title">${escapeHtml(d.title)}${predBadge}</div>
              <div class="row-tag ${cornerClass}">${escapeHtml(d.corner)}${parentTag}${moodChip}</div>
              ${snippetLine}
            </div>
            <button class="row-fav ${isFav?"fav":""}" data-fav-id="${d.id}" aria-label="お気に入り">${isFav?"★":"☆"}</button>
          </div>`;
        }).join("")}
      </div>
    </div>
  `).join("");
}

function renderFavShortcuts() {
  const host = document.getElementById("fav-shortcut-host");
  if (!host) return;
  // 検索中・お気に入りフィルタ中は非表示（重複感防止）
  if (state.query || state.filter === "fav") {
    host.innerHTML = "";
    return;
  }
  // お気に入り → 曲タイトル単位でグループ化、最新放送日付き
  const favItems = data.filter(d => state.favs.has(d.id));
  if (favItems.length === 0) { host.innerHTML = ""; return; }
  const byTitle = {};
  favItems.forEach(d => {
    if (!byTitle[d.title] || d.date > byTitle[d.title].date) byTitle[d.title] = d;
  });
  const list = Object.values(byTitle).sort((a, b) => b.date.localeCompare(a.date)).slice(0, 12);
  host.innerHTML = `
    <div class="fav-shortcut-label">お気に入り（タップで検索）</div>
    <div class="fav-shortcuts">
      ${list.map(d => `
        <button class="fav-shortcut" data-fav-title="${escapeHtml(d.title)}">
          ${escapeHtml(d.title)}
          <small>${fmtDate(d.date)}</small>
        </button>
      `).join("")}
    </div>
  `;
}

function renderDayTabs() {
  const $tabs = document.getElementById("day-tabs");
  if (!$tabs) return;
  const allDates = [...new Set(data.map(d => d.date))].sort().reverse();
  if (allDates.length === 0) { $tabs.innerHTML = ""; return; }
  if (!state.selectedDate || !allDates.includes(state.selectedDate)) {
    const today = todayStrIso();
    state.selectedDate = allDates.includes(today) ? today : allDates[0];
  }
  const todayStr = todayStrIso();
  const wdays = ["日","月","火","水","木","金","土"];
  $tabs.innerHTML = allDates.map(d => {
    const dt = new Date(d);
    const isSel = d === state.selectedDate;
    const isToday = d === todayStr;
    const diffDays = Math.round((new Date(todayStr) - dt) / (1000*60*60*24));
    let sub = "";
    if (diffDays === 0) sub = "今日";
    else if (diffDays === 1) sub = "きのう";
    else if (diffDays === -1) sub = "あした";
    return `
      <button class="day-tab ${isSel?"active":""} ${isToday?"today":""}" data-date="${d}">
        <span class="dt-wd">${wdays[dt.getDay()]}</span>
        <span class="dt-d">${dt.getDate()}</span>
        <span class="dt-sub">${sub || `${dt.getMonth()+1}月`}</span>
      </button>
    `;
  }).join("");
  requestAnimationFrame(() => {
    const activeTab = $tabs.querySelector(".day-tab.active");
    if (activeTab) activeTab.scrollIntoView({behavior:"instant", inline:"center", block:"nearest"});
  });
}

function renderRecentSearches() {
  const recent = getRecent();
  let host = document.getElementById("recent-host");
  if (!host) {
    host = document.createElement("div");
    host.id = "recent-host";
    document.querySelector("header").appendChild(host);
  }
  if (recent.length === 0 || state.query) {
    host.innerHTML = "";
    return;
  }
  host.innerHTML = `<div class="recent-searches">${recent.map(r =>
    `<button class="recent-tag" data-recent="${escapeHtml(r)}">${escapeHtml(r)}</button>`
  ).join("")}</div>`;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

// =================== Events ===================
let searchDebounce;
$search.addEventListener("input", e => {
  state.query = e.target.value;
  render();
  renderRecentSearches();
  renderSuggestions();
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => pushRecent(state.query), 800);
});
$search.addEventListener("focus", () => renderSuggestions());
$search.addEventListener("blur", () => {
  // 候補内のクリック処理を待ってから消す
  setTimeout(() => { document.getElementById("suggest-pop").style.display = "none"; }, 180);
});

function renderSuggestions() {
  const pop = document.getElementById("suggest-pop");
  if (!pop) return;
  const qRaw = state.query.trim();
  const q = normalize(qRaw);
  if (!q || q.length < 1) { pop.style.display = "none"; return; }
  const variants = expandQuery(qRaw);

  // 候補：曲タイトル一致 → keywords/snippet 一致 → 出演者 一致
  const titleHits = new Map();
  const keywordHits = new Map();
  const creditHits = new Map();
  for (const d of data) {
    const titleN = normalize(d.title);
    const matchTitle = variants.some(v => titleN.includes(v));
    if (matchTitle) {
      const cur = titleHits.get(d.title);
      if (!cur || d.date > cur.date) titleHits.set(d.title, d);
      continue;
    }
    if (d.keywords) {
      const matchKw = d.keywords.some(kw => variants.some(v => normalize(kw).includes(v)));
      if (matchKw) {
        const cur = keywordHits.get(d.title);
        if (!cur || d.date > cur.date) keywordHits.set(d.title, d);
        continue;
      }
    }
    if (d.credits) {
      const flat = Object.values(d.credits).flat();
      const matchCr = flat.some(p => variants.some(v => normalize(p).includes(v)));
      if (matchCr) {
        const cur = creditHits.get(d.title);
        if (!cur || d.date > cur.date) creditHits.set(d.title, d);
      }
    }
  }

  const allItems = [
    ...[...titleHits.values()].slice(0, 5).map(d => ({d, kind: "曲名"})),
    ...[...keywordHits.values()].slice(0, 4).map(d => ({d, kind: "雰囲気"})),
    ...[...creditHits.values()].slice(0, 3).map(d => ({d, kind: "出演/作者"})),
  ];

  if (allItems.length === 0) { pop.style.display = "none"; return; }

  const escapeRe = s => s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  const highlightRe = new RegExp(`(${variants.filter(Boolean).map(escapeRe).join("|")})`, "gi");

  pop.innerHTML = allItems.map(({d, kind}) => {
    const hl = escapeHtml(d.title).replace(highlightRe, "<mark>$1</mark>");
    return `
      <div class="suggest-item" data-suggest="${escapeHtml(d.title)}">
        <span class="s-icon">🔍</span>
        <span class="s-title">${hl}</span>
        <span class="s-meta">${kind}</span>
      </div>
    `;
  }).join("");
  pop.style.display = "block";
}

document.addEventListener("click", e => {
  const tag = e.target.closest("[data-recent]");
  if (tag) {
    state.query = tag.dataset.recent;
    $search.value = state.query;
    render();
    renderRecentSearches();
    return;
  }
  const dayTab = e.target.closest(".day-tab[data-date]");
  if (dayTab) {
    state.selectedDate = dayTab.dataset.date;
    render();
    return;
  }
  const favShort = e.target.closest("[data-fav-title]");
  if (favShort) {
    state.query = favShort.dataset.favTitle;
    $search.value = state.query;
    render();
    renderRecentSearches();
    return;
  }
  const sug = e.target.closest("[data-suggest]");
  if (sug) {
    state.query = sug.dataset.suggest;
    $search.value = state.query;
    document.getElementById("suggest-pop").style.display = "none";
    render();
    renderRecentSearches();
  }
});

document.querySelectorAll(".pill").forEach(p => {
  p.addEventListener("click", () => {
    document.querySelectorAll(".pill").forEach(x => x.classList.remove("active"));
    p.classList.add("active");
    state.filter = p.dataset.filter;
    $sectionTitle.textContent = {
      all: "直近2週間の放送",
      okaasan: "おかあさんといっしょ（直近2週間）",
      inai: "いないいないばぁ（直近2週間）",
      fav: "お気に入り",
    }[state.filter];
    render();
  });
});

$list.addEventListener("click", e => {
  const star = e.target.closest("[data-fav-id]");
  if (star) {
    e.stopPropagation();
    const id = +star.dataset.favId;
    state.favs.has(id) ? state.favs.delete(id) : state.favs.add(id);
    render();
    return;
  }
  const row = e.target.closest("[data-id]");
  if (row) openModal(+row.dataset.id);
});

function openModal(id) {
  const d = data.find(x => x.id === id);
  if (!d) return;
  document.getElementById("modal-title").textContent = d.title;
  document.getElementById("modal-show").textContent = `${SHOWS[d.show].name} ・ ${d.corner}${d.parent ? ' ・ ' + d.parent + '内' : ''}`;
  document.getElementById("modal-date").textContent = `${fmtDate(d.date)} ${d.airtime} 放送回 ・ #${d.order || "?"}曲目`;
  document.getElementById("modal-time").textContent = d.offset || (d.order ? `${d.order}曲目` : "—");
  document.getElementById("modal").dataset.show = d.show;

  // 詳細メタ情報（subcategory / credits / mood / snippet / 放送履歴）
  const detailParts = [];

  if (d.subcategory && d.subcategory !== d.corner) {
    detailParts.push(`<div class="meta-line"><span class="meta-label">分類</span><span>${escapeHtml(d.subcategory)}</span></div>`);
  }

  if (d.credits) {
    const labelMap = {
      lyrics: "作詞", music: "作曲", arrange: "編曲",
      vocals: "歌唱", cast: "出演", anim: "アニメ/イラスト",
      original: "原作", script: "脚本", director: "演出",
      choreo: "振付", bgm: "音楽", other: "その他",
    };
    for (const [k, v] of Object.entries(d.credits)) {
      if (!v || !v.length) continue;
      const label = labelMap[k] || k;
      detailParts.push(`<div class="meta-line"><span class="meta-label">${label}</span><span>${escapeHtml(v.join("、"))}</span></div>`);
    }
  }

  if (d.mood) {
    detailParts.push(`<div class="meta-line"><span class="meta-label">ムード</span><span>${escapeHtml(d.mood)}</span></div>`);
  }
  // 歌い出しは別途 lyric-hero で大きく表示するのでここでは省略

  // 同じ曲の他の放送日
  const sameTitle = data.filter(x => x.title === d.title && x.id !== d.id)
    .sort((a, b) => b.date.localeCompare(a.date))
    .slice(0, 10);
  if (sameTitle.length > 0) {
    const chips = sameTitle.map(x =>
      `<button class="other-date-chip" data-jump-id="${x.id}">${fmtDate(x.date)}</button>`
    ).join("");
    detailParts.push(`<div class="meta-line other-dates"><span class="meta-label">他の放送日</span><div class="other-date-list">${chips}</div></div>`);
  }

  const q = encodeURIComponent(d.title + " " + SHOWS[d.show].name);
  const qYTShort = encodeURIComponent(d.title + " NHK");  // 公式チャンネル優先のため
  const qLyric = encodeURIComponent(d.title);
  // NHK公式YouTubeチャンネル名
  const nhkChannel = d.show === "inai"
    ? "https://www.youtube.com/@nhk-inaiinaibaa/search?query=" + qLyric
    : "https://www.youtube.com/@nhk_okaasantoissho/search?query=" + qLyric;

  // 歌い出しヒーローブロック（snippets配列 or snippet単体）
  const snipList = (d.snippets && d.snippets.length) ? d.snippets : (d.snippet ? [d.snippet] : []);
  const lyricHero = snipList.length
    ? `<div class="lyric-hero">
         <div class="lyric-label">${snipList.length > 1 ? "印象的なフレーズ" : "歌い出し"}</div>
         ${snipList.map(s => `<div class="lyric-text">${escapeHtml(s)}</div>`).join("")}
       </div>` : "";

  // 歌のテーマ（AI生成、著作権セーフな描写）
  if (d.theme) {
    detailParts.unshift(`<div class="meta-line"><span class="meta-label">どんな歌</span><span>${escapeHtml(d.theme)}</span></div>`);
  }

  document.getElementById("modal-actions").innerHTML = `
    ${lyricHero}
    ${detailParts.length ? `<div class="meta-block">${detailParts.join("")}</div>` : ""}
    <div class="action-btn" style="background: rgba(255,138,61,0.08); cursor: default;">
      <span class="action-icon icon-tv">📺</span>
      <div>
        <div style="font-size:14px; color:var(--text-dim); margin-bottom:2px;">録画機の操作手順</div>
        <div style="font-size:13px; color:var(--text);">番組表 → ${fmtDate(d.date)} → ${SHOWS[d.show].name}<br>→ ${d.order || "?"}曲目（${d.airtime}〜）</div>
      </div>
    </div>
    <a class="action-btn" href="${nhkChannel}" target="_blank" rel="noopener">
      <span class="action-icon icon-yt">▶</span>NHK公式YouTubeで探す
    </a>
    <a class="action-btn" href="https://www.youtube.com/results?search_query=${qYTShort}" target="_blank" rel="noopener">
      <span class="action-icon icon-yt" style="background:rgba(255,68,68,0.12);">▶</span>YouTube全体で探す
    </a>
    <a class="action-btn" href="https://www.uta-net.com/search/?Aselect=2&Bselect=4&Keyword=${qLyric}" target="_blank" rel="noopener">
      <span class="action-icon icon-lyrics">📝</span>歌詞を探す（うたネット）
    </a>
    <a class="action-btn" href="https://open.spotify.com/search/${q}" target="_blank" rel="noopener">
      <span class="action-icon icon-spo">🎧</span>Spotifyで聴く
    </a>
    <button class="action-btn" id="share-btn" type="button" data-share-id="${d.id}" style="border:none;width:100%;text-align:left;font:inherit;">
      <span class="action-icon" style="background:rgba(106,198,232,0.2);color:#3a9dc8;">📤</span>家族にシェア
    </button>
  `;

  document.getElementById("modal-backdrop").classList.add("open");
}

document.getElementById("modal-backdrop").addEventListener("click", async e => {
  // 他の放送日へジャンプ
  const jump = e.target.closest("[data-jump-id]");
  if (jump) {
    document.getElementById("modal-backdrop").classList.remove("open");
    const id = +jump.dataset.jumpId;
    setTimeout(() => openModal(id), 220);
    return;
  }
  // 共有ボタン
  const share = e.target.closest("[data-share-id]");
  if (share) {
    e.stopPropagation();
    const id = +share.dataset.shareId;
    const d = data.find(x => x.id === id);
    if (!d) return;
    const url = `${location.origin}${location.pathname}#${encodeURIComponent(d.title)}`;
    const text = `「${d.title}」（${SHOWS[d.show].name} ${fmtDate(d.date)} ${d.airtime}〜 #${d.order||"?"}曲目）`;
    if (navigator.share) {
      try {
        await navigator.share({ title: "あずきサーチ", text, url });
      } catch (e) { /* キャンセル時は何もしない */ }
    } else {
      try {
        await navigator.clipboard.writeText(`${text}\n${url}`);
        share.querySelector("span:last-child").textContent = "コピーしたよ✓";
        setTimeout(() => location.reload(), 1500);
      } catch (e) {
        alert(`${text}\n${url}`);
      }
    }
    return;
  }
  if (e.target.id === "modal-backdrop") {
    document.getElementById("modal-backdrop").classList.remove("open");
  }
});

// 音声検索（iOS Safari / Chrome が webkitSpeechRecognition 対応）
(function setupVoiceSearch() {
  const btn = document.getElementById("voice-btn");
  if (!btn) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    btn.style.display = "none";
    return;
  }
  const recog = new SR();
  recog.lang = "ja-JP";
  recog.interimResults = true;
  recog.continuous = false;

  let listening = false;

  btn.addEventListener("click", () => {
    if (listening) {
      recog.stop();
      return;
    }
    try {
      recog.start();
    } catch (e) {
      // すでに開始中の場合を無視
    }
  });

  recog.onstart = () => {
    listening = true;
    btn.classList.add("listening");
    btn.textContent = "●";
  };
  recog.onend = () => {
    listening = false;
    btn.classList.remove("listening");
    btn.textContent = "🎤";
  };
  recog.onresult = (ev) => {
    let text = "";
    for (let i = ev.resultIndex; i < ev.results.length; i++) {
      text += ev.results[i][0].transcript;
    }
    text = text.trim();
    if (!text) return;
    state.query = text;
    $search.value = text;
    render();
    renderRecentSearches();
  };
  recog.onerror = (ev) => {
    console.warn("音声認識エラー:", ev.error);
    listening = false;
    btn.classList.remove("listening");
    btn.textContent = "🎤";
  };
})();

// URL hash（#曲名）で検索状態復元
(function handleDeepLink() {
  const hash = location.hash.replace(/^#/, "");
  if (hash) {
    try {
      const decoded = decodeURIComponent(hash);
      if (decoded) {
        state.query = decoded;
        const el = document.getElementById("search");
        if (el) el.value = decoded;
      }
    } catch (e) { /* ignore */ }
  }
})();

// データ読み込み
async function loadData() {
  try {
    const res = await fetch("data.json", { cache: "no-store" });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    data = json.items.map(x => ({ ...x }));
    // 既存お気に入り状態を反映
    state.favs = new Set(data.filter(d => d.fav).map(d => d.id));
    // 生成時刻バッジ
    const stamp = json.generated_at ? new Date(json.generated_at).toLocaleString("ja-JP") : "";
    if (stamp) {
      const badge = document.createElement("div");
      badge.style.cssText = "font-size:11px;color:var(--text-dim);margin-top:6px;text-align:right;";
      badge.textContent = `📡 最終更新: ${stamp}（${json.source || "unknown"}）`;
      document.querySelector("header").appendChild(badge);
    }
  } catch (e) {
    console.warn("data.json読み込み失敗、フォールバック使用:", e);
    data = FALLBACK_DATA;
    state.favs = new Set(data.filter(d => d.fav).map(d => d.id));
  }
  render();
  renderRecentSearches();
}

loadData();

// Service Worker 登録（PWA化）
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(err => {
      console.warn("SW登録失敗:", err);
    });
  });
}
