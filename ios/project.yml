name: AzukiSearch
options:
  bundleIdPrefix: com.kitagawadaisuke
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: ja

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"            # iPhone only (1=iPhone, 2=iPad, "1,2"=Universal)
    SUPPORTS_MACCATALYST: NO
    DEVELOPMENT_TEAM: ""                    # ← Xcode で自分のTeamを指定する
    CODE_SIGN_STYLE: Automatic

targets:
  AzukiSearch:
    type: application
    platform: iOS
    sources:
      - path: AzukiSearch
        excludes:
          - "**/.DS_Store"
      - path: AzukiSearch/bundled_data.json
        type: file
        buildPhase: resources
    info:
      path: AzukiSearch/Info.plist
      properties:
        CFBundleDisplayName: あずきサーチ
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: LaunchScreenBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: false
        ITSAppUsesNonExemptEncryption: false
        NSSpeechRecognitionUsageDescription: 曲名・歌詞・コーナー名を声で検索するために使います
        NSMicrophoneUsageDescription: 音声入力で番組検索を行うためにマイクを使います
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kitagawadaisuke.azukisearch
        PRODUCT_NAME: AzukiSearch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        DEVELOPMENT_ASSET_PATHS: ""
