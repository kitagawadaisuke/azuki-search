name: Refresh data.json

on:
  schedule:
    # NHK公式ページの放送ページ更新タイミングをカバーするため複数回:
    #   - JST 06:30 (UTC 21:30) … 当日朝の放送前 (新着episode反映)
    #   - JST 09:00 (UTC 00:00) … 放送直後 (再放送/補足反映)
    #   - JST 11:30 (UTC 02:30) … 週報投稿の後追い
    #   - JST 19:00 (UTC 10:00) … 夕方の再放送後 + 翌日分のepg反映
    - cron: "30 21 * * *"
    - cron: "0 0 * * *"
    - cron: "30 2 * * *"
    - cron: "0 10 * * *"
  workflow_dispatch:  # 手動実行も可

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python3 scraper.py --weeks 4

      - name: Commit if changed
        run: |
          if ! git diff --quiet data.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "chore: refresh data.json (auto)"
            git push
          else
            echo "No changes to data.json"
          fi
